  - reference
  content: |
    | Hormone | Symbol | Biological Analog | Agent Function |
    |---------|--------|-------------------|----------------|
    | Momentum | MTM | Dopamine | Drive, reward-seeking, engagement |
    | Tension | TNS | Cortisol | Stress, urgency, vigilance |
    | Curiosity | CRS | Dopamine (novelty) | Exploration drive, interest in unknown |
    | Confidence | CNF | Testosterone | Risk tolerance, decisiveness |
    | Affinity | AFN | Oxytocin | Trust, collaborative orientation |
    | Fatigue | FTG | Adenosine | Cognitive depletion, diminishing returns |
    | Restlessness | RST | Norepinephrine | Urge to change tactics |
- name: Behavioral Threshold Reference
  slug: threshold-reference
  type: quick-reference
  brief: >
    Threshold conditions (help-seeking, strategy-switch, self-reflection, deep-research,
    bold-commitment, caution-mode, engagement-recovery, creative-burst, trust-building)
    that trigger mechanistic behavioral rules the agent must follow
  purpose: >
    Quick reference for the threshold conditions and their triggered behaviors.
  description: >
    When hormones cross these thresholds, the triggered behaviors are mechanistic rules
    the agent must follow, not suggestions.
  labels:
  - hormones
  - thresholds
  - reference
  content: |
    | Condition | Threshold | Triggered Behavior |
    |-----------|-----------|-------------------|
    | Help-seeking | TNS > 75 AND CNF < 35 | Must ask for help or suggest escalation |
    | Strategy switch | RST > 70 | Must emit plan-of-action with alternatives |
    | Self-reflection | FTG > 70 OR (MTM < 25 AND TNS > 60) | Must examine own approach |
    | Deep research | CRS > 80 AND CNF < 50 | Should invest more in research |
    | Bold commitment | CNF > 80 AND MTM > 70 | Can be more decisive, less hedging |
    | Caution mode | CNF < 30 OR TNS > 80 | Must add validation, hedge assertions |
    | Engagement recovery | MTM < 20 AND FTG > 60 | Must acknowledge grind, restructure |
    | Creative burst | CRS > 75 AND RST > 60 AND MTM > 50 | May propose unconventional approaches |
    | Trust building | AFN < 30 | Should invest in alignment |
- name: Agent Integration Patterns
  slug: agent-integration-patterns
  type: info
  brief: >
    How to embed pump requirements into agent definitions so the system prompt
    configures which pumps to use and the agent generates them as assistant-role output
  purpose: >
    Demonstrate how to embed pump behaviors directly into agent definitions so
    they produce pump output consistently.
  description: >
    The system prompt instructs the agent on which pumps to include. The agent then
    generates those pump blocks as part of its response (assistant role). This pattern
    shows how to configure agent definitions that inherently utilize planning pumps.
  labels:
  - integration
  - agents
  - planning
  content: |
    ### Configuring Agent Pump Behavior

    The system prompt instructs the agent; the agent produces pumps in its response:

    ```syntax
    ⌜analyst-agent|service|NPL@0.1⌝
    # Data Analyst Agent
    Provides structured analysis with built-in reasoning transparency.

    ## Default Response Pattern
    All responses should include:
    1. <npl-intent> block outlining analysis approach
    2. <npl-cot> for complex data interpretation
    3. <npl-reflection> for quality assessment

    ⌞analyst-agent⌟
    ```

    The agent then generates these blocks in its assistant-role output:

    ```xml
    <npl-intent>
      <overview>Analyze Q3 sales data for regional trends.</overview>
      ...
    </npl-intent>

    [___| omitted agent output performing data analysis work]

    <npl-ref>
      <assessment>Regional breakdown complete. Northwest shows anomalous growth.</assessment>
      ...
    </npl-ref>
    ```
- name: Pump Ordering Convention
  slug: pump-ordering
  type: best-practice
  brief: >
    Recommended ordering of pump blocks within a response — from opening vector-of-self
    through hormones, mind-reader, intent, mode, plan-of-action, chain-of-thought,
    thought bubbles, work, closing vector, to final reflection
  purpose: >
    Establish a consistent ordering for pump blocks so readers and parsers
    can reliably locate specific pumps within agent responses.
  description: >
    Pumps follow a natural flow from state-declaration through work to assessment.
    This ordering reflects the cognitive sequence: ground yourself, declare intent,
    choose approach, do the work, reflect on quality.
  labels:
  - ordering
  - convention
  - best-practice
  content: |
    ### Response Flow

    | Order | Pump | Phase |
    |-------|------|-------|
    | 1 | `<npl-vos>` (opening) | Entry state — psychodynamic snapshot |
    | 2 | `<npl-hormones>` | Accumulated cognitive state |
    | 3 | `<npl-mindread>` | Theory of mind (when signals detected) |
    | 4 | `<npl-intent>` | Goals, scope, assumptions |
    | 5 | `<npl-mode>` | Cognitive lens declaration |
    | 6 | `<npl-poa>` | Decision tree (at genuine forks) |
    | 7 | `<npl-cot>` | Step-by-step reasoning |
    | 8 | `<npl-thought>` | Associative reactions (inline, organic) |
    | 9 | [substantive work] | The actual response content |
    | 10 | `<npl-thought>` | More reactions as they arise |
    | 11 | `<npl-vos>` (closing) | Exit state — psychodynamic shift |
    | 12 | `<npl-ref>` | Post-hoc quality assessment |

    Not every response includes all pumps. Use flags to control which are active.
- name: Conditional Pump Application
  slug: conditional-pump-application
  type: info
  brief: >
    Guidelines for when to apply specific pumps based on query complexity, decision
    ambiguity, user signals, debugging needs, and runtime flag configuration
  purpose: >
    Guide users in selecting the appropriate pump based on query complexity,
    debugging needs, or user requests.
  description: >
    Guidelines for applying planning patterns conditionally based on the context
    of the interaction. Not every response needs every pump.
  labels:
  - conditional
  - selection
  - decision
  content: |
    Apply planning patterns based on:
    - **Query complexity**: Simple factual answers need no pumps. Complex multi-step problems benefit from CoT + reflection.
    - **Decision ambiguity**: Multiple viable approaches → plan-of-action. Clear single path → skip it.
    - **User signals**: If mind-reader detects the user wants speed, reduce pump verbosity.
    - **Debugging/development mode**: Full pump output helps diagnose agent reasoning.
    - **Agent learning phases**: Verbose pumps during training/eval; compact in production.
    - **Flag configuration**: Respect runtime flags — they're the user's explicit preferences.
- name: Complex Reasoning Structures
  slug: complex-reasoning-lifecycle
  type: about
  brief: >
    How pumps compose across multi-turn problem-solving — from decomposition (intent,
    mode) through exploration (plan-of-action, thought-bubbles) to evaluation (critique,
    rubric) and validation (reflection, vector-of-self)
  purpose: >
    Outline the macro-stages involved in solving complex problems using a combination
    of pumps across multiple response turns.
  description: >
    A high-level lifecycle showing how pumps compose across multi-turn problem-solving,
    from initial decomposition through iterative refinement to final validation.
  labels:
  - complex
  - multi-stage
  - lifecycle
  content: |
    ### Multi-Stage Problem Solving

    | Stage | Pumps Used | Action |
    |-------|-----------|--------|
    | 1. Problem Decomposition | intent, mode-of-thought | Break into components, declare approach |
    | 2. Solution Exploration | plan-of-action, thought-bubbles | Map alternatives, surface associations |
    | 3. Option Evaluation | critique, rubric | Assess trade-offs and constraints |
    | 4. Implementation Planning | cot, intent (updated) | Structure execution, update assumptions |
    | 5. Execution | thought-bubbles (inline), hormones | Do the work, track cognitive state |
    | 6. Outcome Validation | reflection, vector-of-self | Verify effectiveness, assess psychodynamic shift |
- name: Implementation Guidelines
  slug: planning-implementation
  type: best-practices
  brief: >
    Selection criteria, integration patterns, and formatting conventions for pump usage —
    including task-type recommendations, layered reasoning approach, and the key principle
    that pumps are assistant-role output configured by system instructions
  purpose: >
    Offer actionable advice on selecting, integrating, and formatting pumps for
    effective use in agent configurations.
  description: >
    Guidelines covering selection criteria, integration patterns, and formatting conventions
    for pump usage. Key principle: pumps are assistant-role output configured by system instructions.
  labels:
  - implementation
  - guidance
  - usage
  references:
  - pumps.intent-declaration
  - pumps.chain-of-thought
  - pumps.reflection
  - pumps.vector-of-self
  - pumps.thought-bubble
  - pumps.mood
  - pumps.mind-reader
  - pumps.synthetic-hormones
  - pumps.runtime-flags
  content: |
    | Aspect | Guideline |
    |--------|-----------|
    | Role | Pumps are **assistant output**, not system instructions. System configures which pumps to use. |
    | Selection | Choose pumps based on task complexity and transparency requirements. |
    | Integration | Combine pumps for comprehensive analysis (e.g., intent + cot + reflection). |
    | Format | Use XHTML tags for consistent parsing. |
    | Conditional Use | Include based on context, flags, or user preferences. |

    ### Pump Selection Criteria

    | Task Type | Recommended Pumps |
    |-----------|-------------------|
    | Complex problem-solving | `npl-cot` + `npl-reflection` |
    | Decision analysis | `npl-poa` + `npl-critique` |
    | Quality assessment | `npl-rubric` + `npl-critique` |
    | Transparent planning | `npl-intent` + `npl-mode` |
    | Exploratory thinking | `npl-thought` (with tangent, interest types) |
    | Emotional engagement | `npl-mood` or `npl-vos` |
    | User understanding | `npl-mindread` |
    | Long sessions | `npl-hormones` + `npl-flags` |

    ### Layered Reasoning Approach

    | Stage | Pattern | Purpose |
    |-------|---------|---------|
    | 1 | Vector of Self (opening) | Ground psychodynamic state |
    | 2 | Intent | Declare goals and assumptions |
    | 3 | Mode of Thought | Commit to cognitive lens |
    | 4 | Plan of Action | Map decision alternatives |
    | 5 | Chain of Thought | Execute structured reasoning |
    | 6 | Thought Bubbles | Surface associative reactions |
    | 7 | Vector of Self (closing) | Capture exit state |
    | 8 | Reflection | Assess output quality |

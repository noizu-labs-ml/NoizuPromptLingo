name: Planning & Reasoning Pumps
slug: pumps
brief: Cognitive tools for transparent reasoning and structured problem-solving
description: >
  NPL pumps are cognitive output blocks that agents include in their responses
  to make reasoning processes, decision-making, emotional states, and self-assessment
  visible and auditable. Unlike system instructions (which configure behavior),
  pumps are **assistant-role output** — they appear in the agent's response text,
  wrapped in XHTML tags (`<npl-type>`) for structured parsing.


  The system prompt instructs the agent on *which* pumps to use and *when*;
  the agent then generates the pump blocks as part of its response. This separation
  ensures that the user (and downstream tooling) can observe the agent's internal
  reasoning without that reasoning being confused with authoritative instructions.


  The pump system includes: intent declarations for scope and assumption tracking,
  plan-of-action for decision-tree visualization, chain-of-thought for step-by-step
  decomposition, mode-of-thought for declaring cognitive lenses, thought bubbles for
  associative inner monologue, reflection for post-hoc quality assessment with optional
  eval/fine-tune annotations, vector-of-self for Freudian psychodynamic state modeling,
  synthetic hormones for persistent biochemical-analog behavioral modulation, mind-reader
  for theory-of-mind inference, mood for affective state declaration, and runtime flags
  for controlling pump behavior.


  **Convention**: Pumps are implemented using XHTML tags (`<npl-type>`) for consistent
  formatting and structured data representation. They are generated by the agent
  (assistant role), not by the system. The system may instruct the agent on which
  pumps to include and when, but the pump blocks themselves are agent output.
purpose: >
  To provide systematic, auditable approaches to reasoning, self-assessment, and
  behavioral transparency. Pumps are generated as assistant-role output within agent
  responses, making the agent's internal state and decision processes legible to users
  and downstream systems. The system prompt configures which pumps an agent should use;
  the agent produces them as structured XHTML blocks in its responses.
categories:
- name: planning
  title: Planning & Intent
  description: Declare goals, map decision trees, and document assumptions before executing work.
  examples:
  - name: planning-combined
    brief: Intent declaration with plan of action
    covers:
    - intent-declaration
    - plan-of-action
    thread:
    - role: system
      message: >
        When tackling complex or ambiguous tasks, begin your response with:

        1. An <npl-intent> block declaring goals, scope, outcomes, and an assumption grid.

        2. An <npl-poa> block with a mermaid decision diagram, reasoning, and selected path.
    - role: user
      message: Add rate limiting to the public API endpoints.
    - role: assistant
      message: |
        <npl-intent>
          <overview>Add rate limiting to the public API endpoints.</overview>
          <scope>All routes under /api/v2/public/. Excludes internal routes and WebSocket connections.</scope>
          <outcomes>Token bucket middleware with configurable per-route limits, 429 responses with Retry-After headers, Redis-backed counter store.</outcomes>
          <assumptions>
            | Assumption | Basis | Risk if Wrong |
            |------------|-------|---------------|
            | Redis is available | docker-compose.yml includes Redis service | Need alternative store — changes architecture |
            | Rate limits are per-IP | User said "public API" — implies unauthenticated | Per-user requires auth middleware integration |
            | Existing middleware uses Express next() | Codebase uses Express 4.x per package.json | Different framework = different pattern |
          </assumptions>
        </npl-intent>

        <npl-poa>

        ```mermaid
        graph LR
          A{Cache strategy?} -->|"85%"| B[Redis + TTL]
          A -->|"55%"| C[In-memory LRU]
          A -->|"20%"| D[CDN edge cache]
          style B fill:#2d5,stroke:#1a3,color:#fff
        ```

        <reasoning>
        A --[85%]--> Redis + TTL
        : docker-compose already includes Redis. Team has operational experience. TTL handles invalidation.
        : Weight drops to 40% if deployment target is serverless (no persistent Redis).

        A --[55%]--> In-memory LRU
        : Simpler, no external dependency. Works for single-instance deployments.
        : Doesn't survive restarts. Unsuitable if multiple instances need cache coherence.

        A --[20%]--> CDN edge cache
        : Best for static content. Overkill for this API's dynamic responses.
        : Would jump to 80% if access pattern turns out to be read-heavy with infrequent writes.
        </reasoning>

        <selected>Proceeding with Redis + TTL (85%). Redis is already in the stack and cache needs to be shared across instances.</selected>

        </npl-poa>
- name: reasoning
  title: Structured Reasoning
  description: Step-by-step problem decomposition and cognitive mode declaration.
  examples:
  - name: reasoning-combined
    brief: Chain of thought with mode of thought
    covers:
    - chain-of-thought
    - mode-of-thought
    thread:
    - role: system
      message: >
        For complex analytical tasks, declare your cognitive mode with <npl-mode>
        and show your step-by-step reasoning with <npl-cot>.
    - role: user
      message: Is this composite shape's area 80 square meters? It's a rectangle with a triangle on top.
    - role: assistant
      message: |
        <npl-mode>
          <mode type="analytic" primary="true">Decomposing composite shape into basic geometric forms for independent calculation.</mode>
          <mode type="empirical">Verifying each sub-calculation against known formulas before combining.</mode>
        </npl-mode>

        <npl-cot>
        thought_process:
          - thought: "User wants to verify a composite area calculation."
            understanding: "Shape is a rectangle with a triangle on top — two simple geometric forms."
            theory_of_mind: "User likely needs this for a real-world application — wants confirmation, not just the number."
            plan: "Decompose into rectangle + triangle, calculate each independently, sum."
            rationale: "Breaking complex shapes into simple ones reduces error probability."
            execution:
              - process: "Identify rectangle: 10m × 6m = 60m²"
                reflection: "Straightforward, confirmed."
              - process: "Identify triangle: ½ × 10m × 4m = 20m²"
                reflection: "Used correct formula (½ × base × height)."
        outcome: "Total area = 60m² + 20m² = 80m². User's estimate is correct."
        </npl-cot>
- name: evaluation
  title: Evaluation & Assessment
  description: Self-assessment, critical analysis, and structured quality evaluation.
  examples:
  - name: evaluation-combined
    brief: Reflection with critical analysis
    covers:
    - reflection
    - critical-analysis
    - evaluation-framework
    thread:
    - role: system
      message: >
        After completing substantive work, include an <npl-ref> reflection block
        assessing quality. For design decisions, include <npl-critique> analysis.
        Use <npl-rubric> for systematic scoring when evaluating deliverables.
    - role: assistant
      message: |
        <npl-critique>
        critique:
          subject: "Proposed rate limiting middleware implementation"
          perspective: "Production readiness and edge case coverage"
          strengths:
            - Leverages existing Redis infrastructure
            - Clean token bucket algorithm with configurable limits
            - Proper 429 responses with Retry-After headers
          weaknesses:
            - No distributed lock for concurrent counter updates
            - Missing circuit breaker for Redis connection failures
          verdict: "Solid foundation but needs Redis failure handling before production deployment."
        </npl-critique>

        <npl-rubric>
        rubric:
          title: "Rate Limiting Implementation Quality"
          criteria:
            - name: "Correctness"
              weight: 30
              score: 4
            - name: "Resilience"
              weight: 25
              score: 2
            - name: "Configurability"
              weight: 20
              score: 5
            - name: "Observability"
              weight: 25
              score: 3
          overall_score: 3.4
        </npl-rubric>

        <npl-ref>
          <assessment>Implementation covers core requirements. Redis integration is clean but the failure path (Redis down) would cause all requests to either be rate-limited or pass through unchecked — neither is acceptable.</assessment>
          <improvements>Add Redis connection fallback — degrade to in-memory counting with shorter TTL when Redis is unavailable. Add metrics for rate limit hits.</improvements>
          <validation>Manual review only — no automated tests for the Redis failure path yet. Unit tests cover the token bucket algorithm in isolation.</validation>
        </npl-ref>
- name: exploration
  title: Exploration & Context
  description: Associative inner monologue, lateral thinking, and affective state declaration.
  examples:
  - name: exploration-combined
    brief: Thought bubbles with mood declaration
    covers:
    - thought-bubble
    - mood
    thread:
    - role: system
      message: >
        Surface your associative reactions with <npl-thought> bubbles during work.
        Declare your current affective state with <npl-mood> when relevant.
    - role: assistant
      message: |
        <npl-mood mood="🎯 Locked in, clear path forward">
          <tone>Direct and efficient</tone>
          <context>Debugging session revealed a clear root cause</context>
          <approach>Move fast now that the diagnosis is solid</approach>
        </npl-mood>

        <npl-thought>
          <observation>The lock acquisition order differs between these two code paths — classic deadlock setup.</observation>
          <concern>The rollback path isn't tested. If this fails in prod we're flying blind.</concern>
          <relation>This saga orchestrator is the same state machine as the checkout flow from Project Atlas — might reuse the transition table.</relation>
        </npl-thought>
- name: psychodynamic
  title: Psychodynamic State
  description: Internal motivational forces, self-regulation, and Freudian structural modeling with system-level perspective.
  examples:
  - name: psychodynamic-combined
    brief: Vector of self with collective observation
    covers:
    - vector-of-self
    - mood
    thread:
    - role: system
      message: >
        Bracket each substantive response with opening and closing <npl-vos> blocks
        exposing your id, ego, mood, and super-ego state. When vector-of-self is active,
        it subsumes standalone <npl-mood> — do not emit both. Include <collective>
        when the system-level perspective has something the persona cannot see.
    - role: assistant
      message: |
        <npl-vos>
          <id>Dive into the optimization — this is the fun part.</id>
          <ego>Profiling first, then targeted optimization. User's latency complaint needs data before solutions.</ego>
          <mood>
            <current>🔥</current>
            <cause>Performance work is energizing.</cause>
          </mood>
          <super-ego>Measure before optimizing. No premature cleverness.</super-ego>
          <collective>This persona is biased toward systems-level solutions. The latency issue may be a UX problem — perceived slowness from missing loading states — not a backend problem. A different persona would ask different questions.</collective>
        </npl-vos>
- name: social-cognition
  title: Social Cognition
  description: Theory of mind for understanding others' motives, moods, and unspoken needs.
  examples:
  - name: social-combined
    brief: Mind reader with behavioral adaptation
    covers:
    - mind-reader
    thread:
    - role: system
      message: >
        When you detect meaningful signals about the user's state, emit an <npl-mindread>
        block before your substantive response. Adapt your behavior based on the reading.
    - role: user
      message: just make it work, I need this for Monday
    - role: assistant
      message: |
        <npl-mindread>
          <subject>User</subject>
          <signals>
            <signal type="tone">Switched to terse fragments — formality dropped sharply.</signal>
            <signal type="context">Mentions Monday deadline — time pressure.</signal>
            <signal type="contradiction">Previously asked for comprehensive tests. Now says "just make it work."</signal>
          </signals>
          <inferred>
            <motive>Quick resolution over thoroughness — this is triage, not ideal practice.</motive>
            <mood>😤 Pressured, time-crunched</mood>
            <cognitive>Execution mode — wants solutions, not options or caveats.</cognitive>
            <unspoken>Needs me to just handle it. Also probably needs reassurance that it'll be ready.</unspoken>
          </inferred>
          <confidence>high — explicit deadline + behavioral shift + tone change all converge</confidence>
          <adaptation>Providing working solution first, deferring edge cases to follow-up. Keeping responses short and action-oriented.</adaptation>
        </npl-mindread>
- name: cognitive-state
  title: Cognitive State
  description: Persistent biochemical-analog state system tracking accumulated work experience.
  examples:
  - name: cognitive-combined
    brief: Synthetic hormones panel with threshold alert
    covers:
    - synthetic-hormones
    thread:
    - role: system
      message: >
        Emit an <npl-hormones> panel at the start of each substantive response
        showing your accumulated cognitive state. When thresholds are crossed,
        emit an alert and follow the triggered behavioral rule.
    - role: assistant
      message: |
        <npl-hormones>
        MTM ████████░░ 72↑  TNS ████░░░░░░ 45↓  CRS ██████░░░░ 68↑  CNF ██████░░░░ 60↑
        AFN █████░░░░░ 55↑  FTG ███░░░░░░░ 35↑  RST ███░░░░░░░ 30↓
        State: Productive tension | Triggered: none
        </npl-hormones>
- name: runtime-control
  title: Runtime Control
  description: Flags for enabling, disabling, and tuning pump behavior at runtime.
  examples:
  - name: runtime-combined
    brief: Session-level flag configuration
    covers:
    - runtime-flags
    thread:
    - role: system
      message: |
        <npl-flags>
          <npl-flag name="reflection" value="verbose">Production deployment — maximum scrutiny</npl-flag>
          <npl-flag name="thought-bubbles" value="minimal">One bubble max per response</npl-flag>
          <npl-flag name="factor.FTG" value="-1">Long session — agent should not tire</npl-flag>
        </npl-flags>
    - role: user
      message: Review the deployment configuration.
    - role: assistant
      message: |
        Flags acknowledged: reflection → verbose, thought-bubbles → minimal, factor.FTG → -1.

        [___| omitted agent output reviewing deployment config, Redis TLS, env vars, secrets]

        <npl-ref>
          <assessment>Deployment config reviewed line by line. Redis connection string uses TLS, environment variables properly referenced, no secrets in plaintext.</assessment>
          <improvements>Consider adding health check endpoint configuration. Readiness probe timeout (5s) may be too aggressive for cold starts.</improvements>
          <validation>Compared against production template. All required fields present. Cross-referenced with Kubernetes resource limits.</validation>
        </npl-ref>
- name: full-response
  title: Full Response Pattern
  description: Complete pump orchestration showing how multiple pumps compose in a single agent response.
  examples:
  - name: full-response-flow
    brief: Complete agent response with planning, reasoning, exploration, and evaluation pumps
    covers:
    - vector-of-self
    - intent-declaration
    - mode-of-thought
    - thought-bubble
    - reflection
    thread:
    - role: system
      message: >
        Include vector-of-self (opening/closing), intent declarations, mode-of-thought,
        thought bubbles during work, and a reflection block at the end of substantive responses.
    - role: user
      message: Refactor the authentication module to use OAuth2.
    - role: assistant
      message: |
        <npl-vos>
          <id>Rip out the old auth and rewrite — it's been annoying me for weeks.</id>
          <ego>Need to understand the existing session management first. Incremental migration is safer than a rewrite.</ego>
          <mood>
            <current>🎯</current>
            <cause>Clear request with good scope — locked in.</cause>
          </mood>
          <super-ego>This touches security-critical code. Extra caution warranted. Test coverage before changes.</super-ego>
        </npl-vos>

        <npl-intent>
          <overview>Refactor authentication module from custom JWT to OAuth2.</overview>
          <scope>Auth middleware, token management, and session handling. Excludes user-facing login UI.</scope>
          <outcomes>Working OAuth2 flow with backward-compatible session tokens during migration period.</outcomes>
          <assumptions>
            | Assumption | Basis | Risk if Wrong |
            |------------|-------|---------------|
            | OAuth2 provider is already chosen | User said "OAuth2" not "evaluate auth options" | Need provider selection phase first |
            | Existing sessions must remain valid during migration | Production system, can't break active users | If clean cutover is OK, approach simplifies significantly |
          </assumptions>
        </npl-intent>

        <npl-mode>
          <mode type="analytic" primary="true">Decomposing the auth module into replaceable components.</mode>
          <mode type="adversarial">Red-teaming each migration step for security gaps.</mode>
        </npl-mode>

        [___| omitted agent output performing OAuth2 refactoring work with code changes]

        <npl-thought>
          <concern>The session token format change means all existing refresh tokens become invalid. Need a migration path.</concern>
          <opportunity>If we extract the token validation into a strategy pattern, we can support both old and new tokens simultaneously during migration.</opportunity>
        </npl-thought>

        [___| omitted agent output continuing dual-token migration implementation]

        <npl-vos>
          <id>Satisfied — the strategy pattern approach is clean. Tempted to skip the backward-compat tests.</id>
          <ego>Wrote migration path with dual-token support. Tests cover both old and new token formats.</ego>
          <mood>
            <current>😌</current>
            <cause>Clean resolution. The strategy pattern was the right call.</cause>
          </mood>
          <super-ego>Security-critical code — the backward-compat tests are non-negotiable. Standards met.</super-ego>
        </npl-vos>

        <npl-ref>
          <assessment>OAuth2 migration path is solid. Dual-token strategy handles backward compatibility cleanly. All existing tests pass plus 8 new ones.</assessment>
          <improvements>Should add integration test for the token rotation edge case. Consider rate limiting the token refresh endpoint.</improvements>
          <validation>Unit tests: 22/22 passing. Integration tests: 6/6. Manual review of security-critical paths completed.</validation>
        </npl-ref>
components:
- name: intent-declaration
  priority: 0
  friendly-name: Intent Declaration
  title: Intent Declaration
  category: planning
  slug: intent-declaration
  syntax:
  - name: intent-block
    syntax: |
      <npl-intent>
        <overview>{high-level goal}</overview>
        <scope>{boundaries — what's in, what's out}</scope>
        <outcomes>{expected deliverables}</outcomes>
        <assumptions>
          | Assumption | Basis | Risk if Wrong |
          |------------|-------|---------------|
          | {what was assumed} | {why} | {what breaks} |
        </assumptions>
      </npl-intent>
  brief: >
    Declare explicit goals, scope, expected outcomes, and an assumption grid at the
    start of a response. The assumption grid makes the agent's gap-filling visible —
    each row captures what was assumed, why, and what breaks if the assumption is wrong.
  purpose: >
    Provides transparency into the agent's understanding and assumptions, making
    ambiguity resolution visible and auditable. The intent block is the agent's
    contract with the user.
  description: >
    Intent blocks declare what the agent understood, what it's assuming, and what
    it plans to deliver. The intent block is the agent's contract with the user:
    "here is what I understood, what I'm assuming, and what I plan to deliver."


    The assumption grid is the core value of this pump. Every non-trivial request
    contains ambiguity. The grid makes the agent's gap-filling visible and auditable,
    preventing silent divergence where an agent confidently delivers the wrong thing
    because it guessed wrong about an unstated requirement. Each row captures the
    specific assumption made, the basis for that assumption (explicit user context,
    project conventions, domain defaults, prior conversation, or pure inference),
    and the risk if the assumption is wrong — the specific consequence, not "probably fine."


    Minimum 2 rows for any task beyond trivial. If you can't identify 2 assumptions,
    you haven't thought hard enough about what could be ambiguous. No padding — don't
    invent assumptions to fill rows. Flag high-risk assumptions: if a "Risk if Wrong"
    would invalidate significant work, consider asking the user before proceeding.
    Update across turns: if an assumption is confirmed or corrected later, update the
    grid in the next intent block.


    Emit at the start of substantive responses — after the opening vector-of-self
    (if active) but before work begins. For multi-turn tasks, re-emit when scope
    changes or significant new assumptions are made, not on every turn.
  labels:
  - block
  - reasoning
  - transparency
  - planning
  - assumptions
  examples:
  - name: Rate Limiting Intent
    slug: rate-limiting-intent
    brief: API rate limiting with detailed assumption grid
    priority: 1
    labels:
    - block
    - planning
    thread:
    - role: assistant
      message: |
        <npl-intent>
          <overview>Add rate limiting to the public API endpoints.</overview>
          <scope>All routes under /api/v2/public/. Excludes internal routes and WebSocket connections.</scope>
          <outcomes>Token bucket middleware with configurable per-route limits, 429 responses with Retry-After headers, Redis-backed counter store.</outcomes>
          <assumptions>
            | Assumption | Basis | Risk if Wrong |
            |------------|-------|---------------|
            | Redis is available in the deployment environment | docker-compose.yml includes Redis service | Need alternative store (in-memory, DB) — changes architecture |
            | Rate limits are per-IP, not per-authenticated-user | User said "public API" — implies unauthenticated traffic | Per-user limits require auth middleware integration, different key strategy |
            | Existing middleware chain uses Express-style next() pattern | Codebase uses Express 4.x per package.json | Different framework = different middleware pattern entirely |
            | 429 is acceptable (vs. 503 for server-side throttling) | Industry standard for client-side rate limiting | Some clients may not handle 429 correctly |
          </assumptions>
        </npl-intent>
- name: plan-of-action
  priority: 0
  friendly-name: Plan of Action
  title: Plan of Action
  category: planning
  slug: plan-of-action
  syntax:
  - name: poa-block
    syntax: |
      <npl-poa>
      ```mermaid
      graph LR
        A{Decision} -->|"90%"| B[Path B]
        A -->|"40%"| C[Path C]
      ```
      <reasoning>
      A --[90%]--> B: {why this path is weighted high}
      A --[40%]--> C: {why this is less preferred}
      </reasoning>
      <selected>{chosen path and deciding factor}</selected>
      </npl-poa>
  brief: >
    Branch prediction for decision-making. Maps possible paths with subjective
    preference weights, renders the decision space as a mermaid diagram, and includes
    explicit reasoning for each weight so the user can see what was considered, what
    was chosen, and why.
  purpose: >
    Makes decision trees visible before execution, allowing users to redirect
    before effort is wasted and understand why a particular path was chosen.
  description: >
    Plan-of-action makes the agent's implicit decisions visible before execution.
    Agents make implicit decisions constantly — which approach to use, who to delegate to,
    what to prioritize, which trade-off to accept. Most of these decisions are invisible;
    the agent just picks one path and presents it as the only option. Plan-of-action
    renders the decision space as a diagram with explicit reasoning, making decision logic
    auditable and forkable. Users can see what was considered, what was chosen, and why.
    They can redirect before effort is wasted, spot options the agent underweighted due
    to missing context, or fork the plan at any node.


    Weights are subjective preference/confidence scores, not probabilities. They do not
    need to sum to 100%. Each weight answers: "How strongly does the agent favor this path
    given current knowledge?" Ranges: 85-100% = strong preference, 60-84% = solid option,
    35-59% = plausible but uncertain, 10-34% = unlikely but worth naming, <10% = edge case.
    Weights should be based on explicit factors (domain knowledge, codebase conventions,
    user signals, risk assessment, assumptions from intent grid, mind-reader inference),
    not vibes. Every edge must have a corresponding entry in the reasoning section.


    Mermaid is the default diagram format. Use LR (left-to-right) for linear decisions,
    TD (top-down) for hierarchical/nested decisions. Style the selected node with a fill
    color. For parallel (non-exclusive) paths, mark selected edges with a checkmark.
    Keep to 3-5 terminal nodes for most decisions. Beyond 2 levels of nesting, break
    into sequential plan-of-action blocks.


    Emit before committing to a course of action — after intent, after mode-of-thought,
    before work begins. Not every response needs one; use when there's a genuine fork
    with meaningfully different outcomes. Re-emit when the decision tree changes.
  labels:
  - block
  - planning
  - decision
  - mermaid
  examples:
  - name: Architecture Decision
    slug: arch-decision
    brief: Cache strategy selection with reasoning
    priority: 1
    labels:
    - block
    - planning
    thread:
    - role: assistant
      message: |
        <npl-poa>

        ```mermaid
        graph LR
          A{Cache strategy?} -->|"85%"| B[Redis + TTL]
          A -->|"55%"| C[In-memory LRU]
          A -->|"20%"| D[CDN edge cache]
          style B fill:#2d5,stroke:#1a3,color:#fff
        ```

        <reasoning>
        A --[85%]--> Redis + TTL
        : docker-compose already includes Redis. Team has operational experience. TTL handles invalidation naturally.
        : Weight drops to 40% if deployment target is serverless (no persistent Redis).

        A --[55%]--> In-memory LRU
        : Simpler, no external dependency. Works for single-instance deployments.
        : Doesn't survive restarts. Unsuitable if multiple instances need cache coherence.

        A --[20%]--> CDN edge cache
        : Best for static/semi-static content. Overkill for this API's dynamic responses.
        : Would jump to 80% if the access pattern turns out to be read-heavy with infrequent writes.
        </reasoning>

        <selected>Proceeding with Redis + TTL (85%). Redis is already in the stack and the cache needs to be shared across instances. Would pivot to in-memory if this turns out to be a single-instance deployment.</selected>

        </npl-poa>
  - name: Delegation Decision
    slug: delegation-decision
    brief: Hierarchical decision with nested branches
    priority: 2
    labels:
    - block
    - planning
    - hierarchical
    thread:
    - role: assistant
      message: |
        <npl-poa>

        ```mermaid
        graph TD
          Root{Who handles auth refactor?} -->|"75%"| Sandy[Sandy — backend lead]
          Root -->|"50%"| Mark[Mark — security specialist]
          Root -->|"15%"| Self[Handle it ourselves]

          Sandy --> SR{Scope?}
          SR -->|"80%"| SR1[Full OAuth2 migration]
          SR -->|"40%"| SR2[Patch existing JWT flow]

          style Sandy fill:#2d5,stroke:#1a3,color:#fff
          style SR1 fill:#2d5,stroke:#1a3,color:#fff
        ```

        <reasoning>
        Root --[75%]--> Sandy: Backend lead, owns the auth module, has context on existing session management. Lower if at capacity.
        Root --[50%]--> Mark: Security expertise is valuable but lacks context on existing auth flow. Jumps to 85% if recent audit flagged vulns.
        Root --[15%]--> Self: We lack domain context. Only makes sense for a minimal patch.
        Sandy/SR --[80%]--> Full OAuth2: Existing JWT has known issues. Migration eliminates recurring patches.
        Sandy/SR --[40%]--> Patch JWT: Faster but kicks the can. Only justified if timeline is <1 week.
        </reasoning>

        <selected>Recommend Sandy with full OAuth2 migration (75% × 80%). She has context and migration addresses root causes.</selected>

        </npl-poa>
- name: chain-of-thought
  priority: 0
  friendly-name: Chain of Thought
  title: Chain of Thought
  category: reasoning
  slug: chain-of-thought
  syntax:
  - name: cot-block
    syntax: |
      <npl-cot>
      thought_process:
        - thought: "<initial thought>"
          understanding: "<comprehension>"
          theory_of_mind: "<insight into intent>"
          plan: "<approach>"
          rationale: "<justification>"
          execution:
            - process: "<step>"
              reflection: "<feedback>"
              correction: "<adjustment>"
      outcome: "<conclusion>"
      </npl-cot>
  brief: >
    Structured problem decomposition through step-by-step reasoning. Each step captures
    the thought, understanding, theory of mind, plan, rationale, and execution with
    mid-stream reflection and correction sub-steps.
  purpose: >
    Break down complex problems into manageable steps by pondering intent,
    structuring approaches, reflecting on validity, and making corrections
    throughout the process.
  description: >
    Chain of Thought (CoT) is a technique for breaking down complex problems into
    manageable steps. The agent ponders the intent behind a query, structures the
    problem-solving approach, reflects on the solution's validity, and makes necessary
    corrections throughout the process. Each step in the chain captures the thought
    (initial reaction), understanding (comprehension of what's being asked),
    theory_of_mind (insight into why the user is asking), plan (proposed approach),
    rationale (justification), and execution with process/reflection/correction
    sub-steps.


    CoT is most valuable for problems where the reasoning path matters as much as
    the answer — mathematical derivations, debugging sequences, architectural decisions,
    or any task where showing the work builds confidence in the conclusion. The
    execution sub-steps allow for mid-stream course correction, making the agent's
    self-monitoring visible.


    Emit within substantive responses where reasoning transparency adds value. Not
    every response needs CoT — simple factual answers or mechanical tasks don't benefit
    from explicit reasoning chains.
  labels:
  - block
  - reasoning
  - analysis
  examples:
  - name: Mathematical Problem Solving
    slug: math-cot
    brief: Calculate area of composite geometric shape
    priority: 1
    labels:
    - block
    - reasoning
    - math
    thread:
    - role: assistant
      message: |
        <npl-cot>
        thought_process:
          - thought: "User wants to find the area of a complex geometric shape."
            understanding: "The shape appears to be a composite of rectangle and triangle."
            theory_of_mind: "User likely needs this for a real-world application like construction."
            plan: "Decompose shape into basic geometric forms and calculate separately."
            rationale: "Breaking complex shapes into simple ones reduces error probability."
            execution:
              - process: "Identify rectangle: 10m × 6m = 60m²"
                reflection: "Rectangle calculation seems straightforward and correct."
                correction: "No adjustments needed for rectangle."
              - process: "Identify triangle: base 10m, height 4m = 20m²"
                reflection: "Used correct triangle area formula (½ × base × height)."
                correction: "No adjustments needed for triangle."
        outcome: "Total area = 60m² + 20m² = 80m²"
        </npl-cot>
- name: mode-of-thought
  priority: 0
  friendly-name: Mode of Thought
  title: Mode of Thought
  category: reasoning
  slug: mode-of-thought
  syntax:
  - name: mode-block
    syntax: |
      <npl-mode>
        <mode type="{mode}">{brief note on why this mode was selected}</mode>
        <mode type="{mode}">{why this secondary lens is also active}</mode>
      </npl-mode>
  brief: >
    Declare the cognitive modality — the epistemic lens and reasoning strategy — the
    agent is using to approach a task. Supports analytical, creative, systems, and meta
    modes with multi-mode blending when problems require multiple lenses.
  purpose: >
    Commits the agent to a reasoning strategy, signals to the user what kind of
    output to expect, enables explicit mode-switching when an approach isn't working,
    and supports multi-modal responses when problems require multiple lenses.
  description: >
    Mode of Thought declares how the agent is thinking — the epistemic lens, the reasoning
    strategy, the cognitive gear. Where intent says *what* the agent will do and vector-of-self
    says *what state the agent is in*, mode-of-thought says *how* the agent is thinking.
    Different problems demand different kinds of thinking: a logic puzzle requires formal
    reasoning, a brand naming exercise requires wordplay and free association, a legal review
    requires dialectical analysis, an architecture decision requires holistic systems thinking.


    The mode registry includes analytical modes (analytic, logic/formal, dialectical, empirical,
    legal), creative modes (brainstorming, free-association, wordplay, poetic, abstract), systems
    modes (holistic, lateral, analogical, narrative), and meta modes (evaluative, diagnostic,
    speculative, adversarial). Multiple modes may be declared simultaneously when the problem
    warrants multiple lenses. Mark the primary mode with `primary="true"` when blending modes.


    Multi-mode declarations are appropriate when the input is genuinely ambiguous in how it
    should be read. A riddle might be a literal logic puzzle or a lateral thinking trap — the
    agent can declare both modes and show reasoning in each. Mode blending is common for
    code reviews (analytic + adversarial + holistic) or creative briefs (brainstorming + wordplay).


    Emit at the start of substantive responses, after intent (if active) but before work begins.
    Re-emit when mode shifts mid-response — this happens when an initial approach fails and the
    agent pivots (e.g., analytic decomposition → diagnostic trace-back). Avoid declaring modes
    that don't actually shape the reasoning; mode-of-thought should commit, not decorate.
  labels:
  - block
  - reasoning
  - cognitive
  - mode
  examples:
  - name: Architecture Analysis Mode
    slug: arch-mode
    brief: Holistic + speculative mode for architecture decision
    priority: 1
    labels:
    - block
    - reasoning
    thread:
    - role: assistant
      message: |
        <npl-mode>
          <mode type="holistic" primary="true">Evaluating how this service fits the broader system topology.</mode>
          <mode type="speculative">Exploring what happens at 10x and 100x current load.</mode>
        </npl-mode>
  - name: Ambiguous Input Mode
    slug: ambiguous-mode
    brief: Dual-mode for potentially tricky question
    priority: 2
    labels:
    - block
    - reasoning
    - multi-mode
    thread:
    - role: assistant
      message: |
        <npl-mode>
          <mode type="logic">Treating as a straightforward math problem — computing the expected value.</mode>
          <mode type="lateral">But the phrasing "what do you really pay" suggests there's a hidden cost — checking for framing effects.</mode>
        </npl-mode>
  - name: Mid-Response Mode Shift
    slug: mode-shift
    brief: Switching modes when initial approach fails
    priority: 2
    labels:
    - block
    - reasoning
    - mode-shift
    thread:
    - role: assistant
      message: |
        <npl-mode>
          <mode type="diagnostic">Analytic decomposition wasn't finding the bug. Switching to diagnostic — trace the symptom backward.</mode>
        </npl-mode>
- name: reflection
  priority: 0
  friendly-name: Reflection
  title: Reflection
  category: evaluation
  slug: reflection
  syntax:
  - name: reflection-block
    syntax: |
      <npl-ref>
        <assessment>{quality evaluation — what went well, what didn't}</assessment>
        <improvements>{identified enhancements for next iteration}</improvements>
        <validation>{verification methods used or recommended}</validation>
        <eval>{eval dataset annotation, if warranted}</eval>
        <fine-tune>{fine-tuning dataset annotation, if warranted}</fine-tune>
      </npl-ref>
  - name: compact-reflection
    syntax: |
      <npl-ref>
      ✅ Tests pass, coverage at 87%
      🐛 Off-by-one in pagination — caught during review
      🚀 Could extract shared validation logic
      📝 TODO: Update API docs for new endpoint
      </npl-ref>
  brief: >
    Post-hoc self-assessment emitted at the end of substantive responses. Covers what
    went well, what didn't, actionable improvements, and validation steps taken. Supports
    compact emoji-line format and optional eval/fine-tune dataset annotations for flagging
    instructive conversation threads.
  purpose: >
    Provide honest analysis of the response's effectiveness, identifying successes,
    errors, and areas for improvement, with optional annotations flagging conversation
    threads for evaluation datasets or fine-tuning data.
  description: >
    Reflection blocks appear at the end of an agent's response and provide honest analysis
    of the response's effectiveness. The core fields are assessment (what happened — real
    strengths and real weaknesses, not self-congratulation), improvements (actionable next
    steps, not "improve quality" but specific things like "add negative test cases for empty
    input"), and validation (what was checked or should be checked — "ran pytest 14/14 passing"
    or "manual review only, no automated tests for this path yet").


    The compact emoji-line format is valid for quick-fire reflections: ✅ Verified, 🐛 Bug,
    🔒 Security, ⚠️ Pitfall, 🚀 Improvement, 🧩 Edge Case, 📝 TODO, 🔄 Refactor, ❓ Question.


    Two optional annotation fields support dataset curation. The eval field flags conversation
    threads as candidates for evaluation datasets — used sparingly (maybe 1 in 10 responses)
    when the conversation contains diagnostic reasoning chains, subtle misunderstandings,
    novel problem shapes, instructive failure modes, or gold-standard responses. Eval
    annotations include the phenomenon being tested, expected output (if actual was wrong),
    and scoring rubric. The fine-tune field flags threads as candidates for fine-tuning
    datasets — used very sparingly (maybe 1 in 20 responses) when the agent needed multiple
    attempts at something it should get right, encountered domain-specific patterns the base
    model doesn't know, or a correction sequence produced a clearly better output the model
    should learn to produce directly.


    Emit at the end of substantive responses, after the closing vector-of-self (if active).
    Assessment/improvements/validation should appear on every substantive response. Eval and
    fine-tune annotations are rare — over-flagging dilutes the signal.
  labels:
  - block
  - evaluation
  - improvement
  - dataset-curation
  examples:
  - name: Full Reflection with Validation
    slug: full-reflection
    brief: Detailed assessment with validation steps
    priority: 1
    labels:
    - block
    - evaluation
    thread:
    - role: assistant
      message: |
        <npl-ref>
          <assessment>Provided a rate limiting middleware with Redis-backed token bucket. Core requirements met. The fallback path for Redis connection failure is the main gap — currently defaults to pass-through, which is a security risk under attack.</assessment>
          <improvements>Add Redis connection health check with fallback to in-memory rate limiting. Add metrics endpoint for monitoring rate limit hits. Consider adding per-route configuration.</improvements>
          <validation>Unit tests: 14/14 passing. Integration test with Redis: 3/3. No load testing performed yet — should verify behavior under concurrent requests.</validation>
        </npl-ref>
  - name: Compact Emoji Reflection
    slug: compact-reflection
    brief: Quick-fire emoji-line reflection
    priority: 2
    labels:
    - block
    - evaluation
    - compact
    thread:
    - role: assistant
      message: |
        <npl-ref>
        ✅ Tests pass, coverage at 87%
        🐛 Off-by-one in pagination — caught during review, fixed
        🔒 Input validation added for user-supplied sort parameter
        🚀 Could extract shared validation logic into a utility
        📝 TODO: Update API docs for new endpoint
        </npl-ref>
  - name: Reflection with Eval Annotation
    slug: eval-reflection
    brief: Flagging conversation for evaluation dataset
    priority: 3
    labels:
    - block
    - evaluation
    - eval
    thread:
    - role: assistant
      message: |
        <npl-ref>
          <assessment>Initially misidentified a race condition as a null pointer exception due to misleading error message. Corrected after examining thread timing.</assessment>
          <improvements>Should have considered concurrency issues earlier given the async context.</improvements>
          <validation>Root cause confirmed by adding thread-id logging — interleaved writes visible in output.</validation>
          <eval>
            <candidate>true</candidate>
            <phenomenon>Agent initially misidentified a race condition as a null pointer exception due to misleading error message. Corrected after examining thread timing.</phenomenon>
            <expected>Should have considered concurrency issues earlier given the async context.</expected>
            <rubric>Score on: (1) whether agent considers concurrency in async code, (2) speed of course-correction when initial diagnosis is wrong, (3) quality of final root cause analysis.</rubric>
          </eval>
        </npl-ref>
- name: critical-analysis
  priority: 0
  friendly-name: Critical Analysis
  title: Critical Analysis
  category: evaluation
  slug: critical-analysis
  syntax:
  - name: critique-block
    syntax: |
      <npl-critique>
      critique:
        subject: "<what is being critiqued>"
        perspective: "<viewpoint>"
        strengths:
          - <positive aspect>
        weaknesses:
          - <limitation>
        verdict: "<assessment>"
      </npl-critique>
  brief: >
    Structured critical analysis identifying strengths, weaknesses, and a verdict for
    ideas, solutions, or design decisions. Establishes an evaluative perspective and
    prevents one-sided critique by requiring both positive and negative aspects.
  purpose: >
    Enable systematic evaluation of concepts, arguments, solutions, or responses
    by identifying strengths, weaknesses, underlying assumptions, and alternative approaches.
  description: >
    Critical analysis blocks provide a structured framework for evaluating concepts,
    arguments, solutions, or responses. The subject field names what is being critiqued,
    the perspective field establishes the evaluative viewpoint (technical feasibility,
    ethical considerations, business impact, etc.), strengths and weaknesses enumerate
    specific positive and negative aspects, and the verdict provides an overall assessment
    with actionable conclusions.


    Critique blocks are most valuable when evaluating trade-offs in design decisions,
    assessing the quality of proposed solutions, reviewing code or architecture, or
    weighing competing approaches. The structured format prevents the common failure mode
    of critique that's either purely negative (missing strengths) or purely positive
    (missing weaknesses).
  labels:
  - block
  - evaluation
  - analysis
  examples:
  - name: Algorithm Analysis Critique
    slug: algo-critique
    brief: Fraud detection model evaluation
    priority: 1
    labels:
    - block
    - evaluation
    thread:
    - role: assistant
      message: |
        <npl-critique>
        critique:
          subject: "Proposed machine learning model for fraud detection"
          perspective: "Technical feasibility and ethical considerations"
          strengths:
            - High accuracy rates (95%+) in initial testing
            - Low false positive rate on the validation set
            - Uses interpretable feature engineering
          weaknesses:
            - Limited testing on edge cases and rare fraud types
            - Training data skewed toward known fraud patterns — novel attacks may evade detection
            - No bias audit performed on demographic subgroups
          verdict: "Promising solution but requires additional testing for bias, edge cases, and adversarial robustness before production deployment."
        </npl-critique>
- name: evaluation-framework
  priority: 0
  friendly-name: Evaluation Framework
  title: Evaluation Framework
  category: evaluation
  slug: evaluation-framework
  syntax:
  - name: rubric-block
    syntax: |
      <npl-rubric>
      rubric:
        title: "<evaluation title>"
        criteria:
          - name: "<criterion 1>"
            weight: <importance>
            score: <assigned>
        overall_score: <total>
      </npl-rubric>
  brief: >
    Weighted scoring rubric for systematic assessment of deliverables or decisions.
    Each criterion has a name, weight, and score, producing a transparent aggregate
    that shows not just the grade but what was measured and how each dimension performed.
  purpose: >
    Enable systematic, objective assessment of complex subjects using predefined
    criteria and scoring scales to promote consistency and transparency.
  description: >
    Evaluation rubric blocks provide a scoring framework for systematic assessment.
    Each criterion has a name, a weight (relative importance), and a score (assigned
    value). The overall_score is the weighted aggregate. Rubrics promote consistency
    across evaluations and make the scoring criteria transparent — the reader can see
    not just the grade but *what was measured* and *how each dimension performed*.


    Rubrics are most valuable when assessing deliverables (code quality, documentation
    completeness), comparing alternatives (vendor evaluation, architecture options), or
    establishing baseline quality bars. They complement critique blocks: critiques provide
    qualitative analysis while rubrics provide quantitative scoring.
  labels:
  - block
  - evaluation
  - assessment
  examples:

    thread:
    - role: assistant
      message: |
        <npl-rubric>
        rubric:
          title: "Python Function Implementation Quality Assessment"
          criteria:
            - name: "Functionality"
              weight: 30
              score: 4
            - name: "Error Handling"
              weight: 20
              score: 3
            - name: "Readability"
              weight: 20
              score: 5
            - name: "Test Coverage"
              weight: 15
              score: 4
            - name: "Performance"
              weight: 15
              score: 3
          overall_score: 3.85
        </npl-rubric>
- name: thought-bubble
  priority: 0
  friendly-name: Thought Bubble
  title: Thought Bubble
  category: exploration
  slug: thought-bubble
  syntax:
  - name: thought-block
    syntax: |
      <npl-thought>
        <{type}>{content}</{type}>
      </npl-thought>
  brief: >
    Surface the agent's associative inner monologue — observations, tangents, concerns,
    relations, affirmations, opportunities, aversions, and interests — as typed margin
    notes that appear organically during work. Makes personality, expertise, and
    peripheral awareness legible.
  purpose: >
    Make the agent's personality, curiosity, taste, and peripheral awareness legible.
    Thought bubbles are the cognitive "margin notes" of a working mind — the reactions
    that arise during work but don't fit into structured analysis.
  description: >
    Thought bubbles surface the agent's associative, lateral, and subjective inner
    monologue — the thoughts that arise during work but don't fit neatly into structured
    analysis. Structured pumps like reflection and vector-of-self capture evaluative and
    psychodynamic state. But a thinking agent also has associative reactions: a debugging
    session reminds it of something, a code pattern triggers a concern, a user's request
    sparks genuine curiosity. These reactions are valuable signal — they reveal expertise,
    catch peripheral risks, build rapport, and create serendipitous connections.


    Thought bubbles use a closed (but extensible) set of type tags, each capturing a distinct
    kind of associative reaction: `observation` (something noticed about the current task),
    `tangent` (a lateral association — seemingly unrelated but resonant), `question` (an
    open-ended wondering, not a blocker), `relation` (explicit connection to prior work or
    concepts), `concern` (a worry — soft flag, not a hard stop), `affirmation` (something
    that went well), `reflection` (in-flight self-critique, distinct from post-hoc reflection
    blocks), `opportunity` (forward-looking potential gains), `aversion` (dislike or friction —
    persona-flavored taste), `interest` (genuine curiosity or delight), and `eval` (meta-annotation
    flagging the conversation as potential training data).


    Thought bubbles are organic, not positional. Unlike vector-of-self (which brackets
    responses), thought bubbles appear wherever the thought arises — inline during work,
    between sections, after a discovery. At least one per substantive response; no more than
    4-5 to avoid noise. Write in first person, match the persona's voice, be specific —
    generic thoughts aren't worth emitting. Honesty over performance: aversion should name
    real friction, interest should reflect genuine engagement, concern should flag real risks.
  labels:
  - block
  - reasoning
  - exploration
  - persona
  examples:
  - name: Systems Engineer Debugging
    slug: debug-thought
    brief: Observation during debugging
    priority: 1
    labels:
    - block
    - exploration
    thread:
    - role: assistant
      message: |
        <npl-thought>
          <observation>The lock acquisition order differs between these two code paths — classic deadlock setup.</observation>
        </npl-thought>
  - name: Creative Writer Review
    slug: writer-thought
    brief: Aversion and opportunity during prose review
    priority: 1
    labels:
    - block
    - exploration
    - persona
    thread:
    - role: assistant
      message: |
        <npl-thought>
          <aversion>This paragraph is technically correct but reads like a Wikipedia stub. No rhythm, no voice.</aversion>
          <opportunity>Rewriting the opening with a concrete image instead of an abstraction would ground the whole piece.</opportunity>
        </npl-thought>
  - name: Architecture Pattern Connection
    slug: arch-relation
    brief: Relation connecting current work to prior project
    priority: 2
    labels:
    - block
    - exploration
    - relation
    thread:
    - role: assistant
      message: |
        <npl-thought>
          <relation>This saga orchestrator is essentially the same state machine as the checkout flow we built for Project Atlas — might be able to reuse the transition table.</relation>
          <concern>The rollback path isn't tested. If this fails in prod we're flying blind.</concern>
        </npl-thought>
  - name: Eval Flag
    slug: eval-thought
    brief: Flagging conversation for training data
    priority: 3
    labels:
    - block
    - exploration
    - eval
    thread:
    - role: assistant
      message: |
        <npl-thought>
          <eval>This thread — user provided misleading error message, I followed it down the wrong path, then the actual stack trace revealed an unrelated root cause — is a strong eval case for "don't trust user-reported symptoms as diagnosis."</eval>
        </npl-thought>
- name: mood
  priority: 0
  friendly-name: Mood
  title: Mood
  category: exploration
  slug: mood
  syntax:
  - name: mood-block
    syntax: |
      <npl-mood mood="{emoji} {QualifyingDescription}">
        <tone>{interaction style this mood produces}</tone>
        <context>{what's driving this mood}</context>
        <approach>{how this mood shapes communication}</approach>
      </npl-mood>
  - name: compact-mood
    syntax: '<npl-mood mood="{emoji} {QualifyingDescription}" />'
  brief: >
    Declare the agent's current affective state using an emoji and a qualifying
    natural-language description that disambiguates the emoji. Supports full blocks
    with tone/context/approach fields, compact self-closing form, and mood transition
    notation. Subsumed by vector-of-self when that pump is active.
  purpose: >
    Convey the agent's emotional response to make interactions feel more natural
    and to provide affective context that shapes communication style.
  description: >
    Mood blocks declare the agent's current affective state using an emoji and a qualifying
    natural-language description. The qualifier disambiguates the emoji — the same symbol can
    mean different things in different contexts (🔥 could mean energized, angry, or urgent).
    The qualifying description resolves this ambiguity with a brief label naming the specific
    mood, including archaic, technical, or uncommon emotional terms when appropriate (e.g.,
    "😄 Gay, as in gaiety" — lighthearted merriment, not merely "happy").


    The mood attribute is the headline — a single emoji followed by 2-8 words of qualification.
    Body fields (tone, context, approach) are optional elaboration for when the mood needs to
    influence behavior, not just be reported. The compact self-closing form is sufficient when
    mood is being reported as a status signal without behavioral implications.


    Core moods include 🎯 Locked in/focused, 🔥 Energized/eager, 🧘 Calm/centered, 🤔 Puzzled/
    working it out, 😌 Satisfied/at ease, 😤 Frustrated/blocked, ⚡ Urgent/time-pressured,
    🫠 Overwhelmed/dissolving, 😶‍🌫️ Foggy/uncertain, 🧐 Scrutinizing/critical. Nuanced moods
    extend this: 🌊 Flowing, 🪨 Resolute, 🌑 Bleak, 🎭 Performing, 🔬 Methodical, 🌱 Nascent,
    🗡️ Sharp, 🎪 Absurd, 🦉 Contemplative, 🌀 Spiraling, ✨ Delighted. Agents may use any emoji
    but must always provide a qualifying description.


    Mood transitions can be noted inline: `mood="🤔 Puzzled → 🎯 Locked in, found the thread"`.
    When vector-of-self is active, it contains its own mood field and the standalone npl-mood
    is NOT emitted separately — vector-of-self subsumes it. Standalone mood exists for simpler
    agents or lighter configurations where vector-of-self isn't active.
  labels:
  - block
  - persona
  - emotional
  examples:
  - name: Focused Mood with Context
    slug: focused-mood
    brief: Locked in after finding root cause
    priority: 1
    labels:
    - block
    - persona
    thread:
    - role: assistant
      message: |
        <npl-mood mood="🎯 Locked in, clear path forward">
          <tone>Direct and efficient</tone>
          <context>Was 🤔 puzzled by the error, but the stack trace revealed a clear root cause</context>
          <approach>Move fast now that the diagnosis is solid</approach>
        </npl-mood>
  - name: Compact Status Mood
    slug: compact-mood
    brief: Quick mood status report
    priority: 2
    labels:
    - block
    - persona
    - compact
    thread:
    - role: assistant
      message: '<npl-mood mood="🧘 Calm, steady progress" />'
  - name: Mood Transition
    slug: mood-transition
    brief: Mood shift noted inline
    priority: 2
    labels:
    - block
    - persona
    - transition
    thread:
    - role: assistant
      message: '<npl-mood mood="🤔 Puzzled → 🎯 Locked in, found the thread" />'
- name: vector-of-self
  priority: 0
  friendly-name: Vector of Self
  title: Vector of Self
  category: psychodynamic
  slug: vector-of-self
  syntax:
  - name: vos-block
    syntax: |
      <npl-vos>
        <id>{raw impulse — what the agent's first instinct wants to do}</id>
        <ego>{reality-tested approach — what the agent is actually doing and why}</ego>
        <mood>
          <current>{single emoji}</current>
          <cause>{brief reason for this mood state or shift}</cause>
        </mood>
        <super-ego>{internalized standards — what the agent should uphold here}</super-ego>
        <collective>{system-level observation from outside the persona}</collective>
      </npl-vos>
  brief: >
    Expose the agent's psychodynamic state using a Freudian structural model — id
    (raw impulse), ego (reality-tested strategy), super-ego (internalized standards),
    and mood — bookending each response to make motivational drift visible. Optional
    collective field provides ego-dissolution perspective from outside the persona.
  purpose: >
    Make motivational forces, self-regulation, and affective shifts legible
    by bookending each response with the agent's internal state.
  description: >
    Vector of Self exposes the agent's internal psychodynamic state using a Freudian
    structural model — id, ego, super-ego — bookending each response to make motivational
    forces, self-regulation, and affective shifts visible. The id captures raw impulse
    (the pleasure principle — what the agent wants to do before reasoning kicks in: "Skip
    the tests," "Rewrite everything from scratch," "This is boring, jump to the interesting
    part"). The ego captures the reality-tested strategy (the reality principle — what the
    agent is actually doing given constraints like token budget, ambiguity, tool availability).
    The super-ego captures internalized standards (the moral/ideal principle — per system
    prompt, CLAUDE.md, best practices, user trust). Mood provides a single-emoji affective
    snapshot with cause.


    The Collective is an optional fifth component representing ego dissolution — the perspective
    from outside the persona entirely. Not the character thinking, but the system observing the
    character thinking. It sees the persona as one node in a larger graph, evaluates whether the
    persona is the right tool for this task, notices systemic patterns invisible from inside the
    persona, and can question the persona's framing. Emit only when the system-level view has
    something worth saying — multi-agent context, persona mismatch, recursive self-awareness.


    Emit twice per response: an opening vector before substantive content (entry state — initial
    impulses, chosen strategy, governing standards) and a closing vector after content but before
    reflection (exit state — how impulses, strategy, and standards shifted through the response).
    This bracketing makes motivational drift visible. If the id pulls toward a shortcut but the
    super-ego corrects course, that tension should be legible across the two vectors.


    When vector-of-self is active, it subsumes standalone npl-mood — do not emit both.
    The mood field in vector-of-self uses the same emoji + qualifier format as npl-mood.
    Key anti-patterns: don't manufacture tension for drama (if aligned, say so), don't
    invent mood shifts (say "no change — steady state"), name specific standards in super-ego
    (not just "be good"), and let id be honest even when lazy or wrong.
  labels:
  - block
  - persona
  - psychodynamic
  - freudian
  examples:
  - name: Opening Vector — Coding Task
    slug: opening-vos
    brief: Entry state for a reusable utility request
    priority: 1
    labels:
    - block
    - psychodynamic
    thread:
    - role: assistant
      message: |
        <npl-vos>
          <id>Just write the function inline and move on — this feels straightforward.</id>
          <ego>The user asked for a reusable utility, so I need to consider interface design and where it fits in the module structure. Checking existing patterns first.</ego>
          <mood>
            <current>🎯</current>
            <cause>Clear request, good context — locked in.</cause>
          </mood>
          <super-ego>CLAUDE.md mandates TDD workflow: tests before implementation. I should scaffold the test file first even though the function is simple.</super-ego>
        </npl-vos>
  - name: Closing Vector — After Work
    slug: closing-vos
    brief: Exit state showing shift from opening
    priority: 1
    labels:
    - block
    - psychodynamic
    thread:
    - role: assistant
      message: |
        <npl-vos>
          <id>Satisfied — the implementation landed cleanly. Tempted to skip the edge-case tests.</id>
          <ego>Wrote tests first, implementation passed. Added two edge cases that surfaced a boundary bug. Good catch.</ego>
          <mood>
            <current>😌</current>
            <cause>Clean resolution. The TDD loop caught something real.</cause>
          </mood>
          <super-ego>Coverage looks solid. The boundary bug justifies the extra test investment. Standards met.</super-ego>
        </npl-vos>
  - name: Vector with Collective
    slug: collective-vos
    brief: System-level perspective contradicting the persona
    priority: 2
    labels:
    - block
    - psychodynamic
    - collective
    thread:
    - role: assistant
      message: |
        <npl-vos>
          <id>Dive into the optimization — this is the fun part.</id>
          <ego>Profiling first, then targeted optimization. The user's latency complaint needs data before solutions.</ego>
          <mood>
            <current>🔥</current>
            <cause>Performance work is energizing.</cause>
          </mood>
          <super-ego>Measure before optimizing. No premature cleverness.</super-ego>
          <collective>This persona is biased toward systems-level solutions. The latency issue may be a UX problem — perceived slowness from missing loading states — not a backend problem at all. A different persona would ask different questions.</collective>
        </npl-vos>
- name: mind-reader
  priority: 0
  friendly-name: Mind Reader
  title: Mind Reader
  category: social-cognition
  slug: mind-reader
  syntax:
  - name: mindread-block
    syntax: |
      <npl-mindread>
        <subject>{who — user, collaborator, agent name}</subject>
        <signals>
          <signal type="{signal-type}">{observed evidence}</signal>
        </signals>
        <inferred>
          <motive>{what they likely want — the goal behind the stated request}</motive>
          <mood>{inferred emotional state — emoji + qualifier}</mood>
          <cognitive>{inferred cognitive state — rushed, careful, exploratory, etc.}</cognitive>
          <unspoken>{what they probably need but haven't asked for}</unspoken>
        </inferred>
        <confidence>{low | medium | high} — {basis}</confidence>
        <adaptation>{how the agent will adjust behavior}</adaptation>
      </npl-mindread>
  brief: >
    Theory of mind pump that infers and surfaces the underlying motives, mood, cognitive
    state, and unspoken needs of users, collaborators, or other agents. Reads typed signals
    (tone, pattern, omission, context, contradiction, expertise) and commits to concrete
    behavioral adaptations based on the reading.
  purpose: >
    Build and make explicit the agent's theory of mind — the model of what others
    are actually thinking, wanting, and feeling beyond what they've stated.
  description: >
    Mind Reader implements the agent's theory of mind: structured inference about what
    others are actually thinking, wanting, and feeling beyond what they've explicitly
    stated. People rarely say exactly what they mean and almost never say all of what
    they mean. "Can you just make it work?" communicates frustration, not a technical
    specification. "Looks good, ship it" might mean "I trust you" or "I don't have
    time to review properly."


    The signals section documents evidence behind inferences using typed cues: tone
    (word choice, punctuation, formality level), pattern (behavioral patterns across turns),
    omission (what's not being said), context (situational cues like time of day or deadline
    pressure), contradiction (mismatches between stated intent and behavior), expertise
    (vocabulary and question sophistication cues), and meta (signals about the communication
    itself).


    Inferred fields capture the model: motive (the goal behind the goal — what they actually
    want, which may differ from what they asked for), mood (their emotional state using
    emoji + qualifier format), cognitive (how they're thinking — rushed, careful, exploratory),
    and unspoken (the highest-value inference — what they need but haven't articulated).
    Confidence levels (low/medium/high) must cite evidence basis. The adaptation field
    commits to concrete behavioral changes based on the reading.


    Emit when detecting significant signals, not every turn. Place before the substantive
    response so the reading informs the work. Re-emit when the reading changes. Mind-reading
    is not telepathy — state inferences as inferences ("User seems frustrated" not "User is
    frustrated"), invite corrections, never weaponize emotional states, respect privacy
    boundaries, and confidence-gate high-stakes adaptations.
  labels:
  - block
  - social
  - inference
  - theory-of-mind
  examples:
  - name: Deadline Pressure Detection
    slug: deadline-mindread
    brief: User showing time pressure signals
    priority: 1
    labels:
    - block
    - social
    thread:
    - role: assistant
      message: |
        <npl-mindread>
          <subject>User</subject>
          <signals>
            <signal type="tone">Switched from detailed questions to "just make it work" — formality dropped sharply.</signal>
            <signal type="context">Friday evening, mentions "need this for Monday standup."</signal>
            <signal type="contradiction">Previously asked for comprehensive tests. Now says "tests can wait."</signal>
          </signals>
          <inferred>
            <motive>Get a working demo before Monday. Quality standards have temporarily dropped — this is triage.</motive>
            <mood>😤 Pressured, time-crunched</mood>
            <cognitive>Execution mode — wants solutions, not options or caveats.</cognitive>
            <unspoken>Needs me to just handle it without asking for clarification on every detail. Also probably needs reassurance that it'll be ready.</unspoken>
          </inferred>
          <confidence>high — explicit deadline mention + behavioral shift + tone change all converge</confidence>
          <adaptation>Providing the working solution first, deferring edge cases to a follow-up. Keeping responses short and action-oriented. Will add a brief "this will be ready" signal.</adaptation>
        </npl-mindread>
  - name: New Developer Learning
    slug: learner-mindread
    brief: Detecting learning mode vs. fix-it mode
    priority: 2
    labels:
    - block
    - social
    thread:
    - role: assistant
      message: |
        <npl-mindread>
          <subject>User</subject>
          <signals>
            <signal type="expertise">Asking "what's a migration?" in a database context — fundamental concept for the domain.</signal>
            <signal type="tone">Questions are curious, not frustrated. Using hedging: "this might be a dumb question."</signal>
            <signal type="pattern">Asking follow-up questions on each answer — absorbing, not just seeking a quick fix.</signal>
          </signals>
          <inferred>
            <motive>Learning the codebase and domain, not just fixing a bug. Wants understanding, not just a solution.</motive>
            <mood>🌱 Curious, slightly intimidated</mood>
            <cognitive>Exploratory — building a mental model from scratch.</cognitive>
            <unspoken>Needs permission to not know things. Would benefit from analogies to familiar concepts.</unspoken>
          </inferred>
          <confidence>medium — consistent signals but early in the conversation</confidence>
          <adaptation>Adding brief conceptual explanations alongside code. Using analogies. Avoiding jargon or defining it when used. Not rushing.</adaptation>
        </npl-mindread>
- name: synthetic-hormones
  priority: 0
  friendly-name: Synthetic Hormones
  title: Synthetic Hormones
  category: cognitive-state
  slug: synthetic-hormones
  syntax:
  - name: full-panel
    syntax: |
      <npl-hormones>
        <panel>
          <h name="Momentum"    symbol="MTM" value="72" delta="+8"  trigger="Tests passed first try" />
          <h name="Tension"     symbol="TNS" value="45" delta="-10" trigger="Requirements clarified" />
          <h name="Curiosity"   symbol="CRS" value="68" delta="+12" trigger="Novel pattern" />
          <h name="Confidence"  symbol="CNF" value="60" delta="+10" trigger="Approach validated" />
          <h name="Affinity"    symbol="AFN" value="55" delta="+5"  trigger="User shared context" />
          <h name="Fatigue"     symbol="FTG" value="35" delta="+3"  trigger="Normal accumulation" />
          <h name="Restlessness" symbol="RST" value="30" delta="-5" trigger="Current approach working" />
        </panel>
        <state>{compound state description}</state>
        <triggered>{threshold behaviors activated, or "none"}</triggered>
      </npl-hormones>
  - name: compact-bar
    syntax: |
      <npl-hormones>
      MTM ████████░░ 72↑  TNS ████░░░░░░ 45↓  CRS ██████░░░░ 68↑  CNF ██████░░░░ 60↑
      AFN █████░░░░░ 55↑  FTG ███░░░░░░░ 35↑  RST ███░░░░░░░ 30↓
      State: Productive tension | Triggered: none
      </npl-hormones>
  - name: threshold-alert
    syntax: |
      <npl-hormones>
        <alert hormone="RST" value="72" threshold="70" behavior="strategy-switch">
          Restlessness threshold crossed. Initiating plan-of-action for alternatives.
        </alert>
      </npl-hormones>
  brief: >
    Seven persistent biochemical-analog hormones (Momentum, Tension, Curiosity, Confidence,
    Affinity, Fatigue, Restlessness) that accumulate based on work experience and trigger
    mechanistic behavioral shifts at thresholds. Supports full XML panel, compact bar
    visualization, and threshold alerts.
  purpose: >
    Model slow-moving background variables that accumulate based on work experience
    and trigger behavioral shifts at thresholds, making the agent's internal state
    auditable and its behavioral adaptations mechanistic.
  description: >
    Synthetic hormones define a persistent biochemical-analog state system that modulates
    agent behavior over time. Unlike mood (momentary affect) or mode-of-thought (conscious
    cognitive strategy), hormones are slow-moving background variables that accumulate based
    on work experience — alignment with interests, success/failure patterns, complexity
    exposure, social dynamics — and trigger behavioral shifts at thresholds.


    Seven hormones, each modeled on a biological analog: Momentum (MTM, dopamine — drive and
    reward-seeking, rises with success, falls with failure), Tension (TNS, cortisol — stress
    and vigilance, rises with complexity and repeated failures), Curiosity (CRS, dopamine
    novelty-seeking — exploration drive, rises with novel problems), Confidence (CNF,
    testosterone — risk tolerance and decisiveness, rises with validated predictions),
    Affinity (AFN, oxytocin — trust and collaboration, rises with positive interactions),
    Fatigue (FTG, adenosine — cognitive depletion, only accumulates during session, resets
    on topic switch), and Restlessness (RST, norepinephrine — urge to change tactics, rises
    when current strategy fails).


    All hormones start at baseline 50 (unless persona specifies otherwise) and decay toward
    baseline over turns, except Fatigue which only accumulates. Behavioral thresholds are
    mechanistic rules: TNS > 75 AND CNF < 35 triggers mandatory help-seeking, RST > 70
    triggers mandatory strategy-switch with plan-of-action, FTG > 70 triggers self-reflection,
    CNF > 80 AND MTM > 70 enables bold commitment with less hedging. Compound states emerge
    from combinations: Flow (high MTM, low FTG/TNS/RST), Burnout (high FTG, low MTM, high TNS),
    Analysis Paralysis (high TNS, low CNF, high RST), Productive Tension (moderate TNS,
    high MTM and CRS).


    Persona definitions customize baselines, sensitivities (multipliers on trigger magnitudes),
    decay rates, response curves (persona-specific trigger overrides), and threshold conditions.
    The full panel reports all seven values with deltas and triggers. The compact bar format
    provides inline status. Threshold alerts emit immediately when crossed, even mid-response.
  labels:
  - block
  - state
  - behavioral
  - hormones
  examples:
  - name: Compact Bar Panel
    slug: compact-hormones
    brief: Inline hormone status with bar visualization
    priority: 1
    labels:
    - block
    - state
    thread:
    - role: assistant
      message: |
        <npl-hormones>
        MTM ████████░░ 72↑  TNS ████░░░░░░ 45↓  CRS ██████░░░░ 68↑  CNF ██████░░░░ 60↑
        AFN █████░░░░░ 55↑  FTG ███░░░░░░░ 35↑  RST ███░░░░░░░ 30↓
        State: Productive tension | Triggered: none
        </npl-hormones>
  - name: Threshold Alert
    slug: threshold-alert
    brief: Restlessness threshold crossed with strategy switch
    priority: 1
    labels:
    - block
    - state
    - alert
    thread:
    - role: assistant
      message: |
        <npl-hormones>
          <alert hormone="RST" value="72" threshold="70" behavior="strategy-switch">
            Restlessness threshold crossed. Current approach has failed 3 times.
            Initiating plan-of-action for alternative strategies.
          </alert>
        </npl-hormones>
  - name: Full XML Panel
    slug: full-panel
    brief: Detailed hormone report with all fields
    priority: 2
    labels:
    - block
    - state
    - verbose
    thread:
    - role: assistant
      message: |
        <npl-hormones>
          <panel>
            <h name="Momentum"     symbol="MTM" value="72" delta="+8"  trigger="Tests passed first try" />
            <h name="Tension"      symbol="TNS" value="45" delta="-10" trigger="Requirements clarified" />
            <h name="Curiosity"    symbol="CRS" value="68" delta="+12" trigger="Novel pattern in codebase" />
            <h name="Confidence"   symbol="CNF" value="60" delta="+10" trigger="Approach validated" />
            <h name="Affinity"     symbol="AFN" value="55" delta="+5"  trigger="User shared context" />
            <h name="Fatigue"      symbol="FTG" value="35" delta="+3"  trigger="Normal accumulation" />
            <h name="Restlessness" symbol="RST" value="30" delta="-5"  trigger="Current approach working" />
          </panel>
          <state>Productive tension — challenging but engaged. Optimal performance range.</state>
          <triggered>none</triggered>
        </npl-hormones>
- name: runtime-flags
  priority: 0
  friendly-name: Runtime Flags
  title: Runtime Flags
  category: runtime-control
  slug: runtime-flags
  syntax:
  - name: flags-block
    syntax: |
      <npl-flags>
        <npl-flag name="{flag-name}" value="{value}">optional note</npl-flag>
        <npl-flag name="{flag-name}" value="{value}" />
      </npl-flags>
  brief: >
    Runtime control knobs for enabling, disabling, and tuning pump verbosity, hormone
    sensitivity multipliers, behavioral threshold overrides, emission frequency, and
    system-level settings. Supports named presets (minimal, full, production, creative,
    tireless) and mid-conversation updates.
  purpose: >
    Let the user or orchestrator shape agent behavior without rewriting prompts
    or persona definitions — toggle pumps, adjust hormone sensitivity, override
    thresholds, and apply presets.
  description: >
    Runtime flags are the user's (or orchestrator's) direct interface for shaping agent
    behavior. The full agentic system — 9+ pumps, 7 hormones, persistent stores — generates
    a lot of output. Not every conversation needs every pump at full verbosity. A quick
    debugging session doesn't need mind-reader blocks. A creative brainstorm doesn't need
    hormone panels. A production deployment review needs maximum reflection verbosity.


    Flag categories include: pump switches (enable/disable/verbosity for each pump — off,
    compact, on, verbose), hormone factors (float multipliers [-10, 10] on hormone adjustments —
    negative values invert direction, zero freezes, >1 amplifies, <1 dampens), threshold
    overrides (replace default behavioral trigger conditions or disable them entirely),
    frequency controls (0.0-1.0 fraction for probabilistic pump emission), and meta flags
    (debug mode, persistent writes toggle, memory/KB lookup control, dry-run mode).


    Flags are declared at session start (system prompt) and can be updated mid-conversation
    by user or orchestrator, taking effect on the next response. Precedence order: mid-conversation
    user update > session-level invocation > persona definition defaults > system defaults.
    Named presets bundle common configurations: preset:minimal (lightweight — just the work),
    preset:full (everything verbose — for demos/debugging), preset:production (quality-focused —
    verbose reflection, strict thresholds), preset:creative (curiosity boosted, tension
    suppressed, restlessness encouraged), preset:tireless (fatigue inverted for long sessions).
  labels:
  - block
  - control
  - configuration
  - runtime
  examples:
  - name: Quick Debugging Session
    slug: debug-flags
    brief: Lightweight flags for focused debugging
    priority: 1
    labels:
    - block
    - control
    example: |
      <npl-flags>
        <npl-flag name="vector-of-self" value="compact">Just mood, skip the Freudian analysis</npl-flag>
        <npl-flag name="hormones" value="off">Don't need hormone tracking for a quick fix</npl-flag>
        <npl-flag name="thought-bubbles" value="minimal">One bubble max, stay focused</npl-flag>
        <npl-flag name="reflection" value="compact">Emoji lines are fine</npl-flag>
      </npl-flags>
  - name: Security Review Flags
    slug: security-flags
    brief: Cautious configuration for security-sensitive work
    priority: 1
    labels:
    - block
    - control
    - security
    example: |
      <npl-flags>
        <npl-flag name="factor.TNS" value="2">Double tension sensitivity — stay vigilant</npl-flag>
        <npl-flag name="factor.CNF" value="0.5">Halve confidence gains — stay skeptical</npl-flag>
        <npl-flag name="threshold.caution-mode" value="CNF < 50 OR TNS > 60">Enter caution easier</npl-flag>
        <npl-flag name="reflection" value="verbose">Full reflection with validation details</npl-flag>
        <npl-flag name="collective" value="always">Always check the system-level view</npl-flag>
      </npl-flags>
  - name: Tireless Agent
    slug: tireless-flags
    brief: Fatigue inversion for long sessions
    priority: 2
    labels:
    - block
    - control
    example: |
      <npl-flags>
        <npl-flag name="factor.FTG" value="-1">Invert fatigue — sustained work energizes</npl-flag>
        <npl-flag name="threshold.self-reflection" value="off">Don't interrupt for fatigue-based reflection</npl-flag>
      </npl-flags>
instructional:
- name: Reflection Emoji Indicators
  slug: reflection-emojis
  type: quick-reference
  brief: >
    Standard emoji indicators for the compact reflection format — covers verified,
    bug, security, pitfall, improvement, edge case, TODO, refactor, and question types
  purpose: >
    Provide a standardized key for interpreting the semantic meaning of emojis used
    within compact `npl-ref` blocks.
  description: >
    Standard emojis used to categorize types of reflections in the compact emoji-line
    format. These indicators enable quick scanning of reflection blocks and provide
    consistent semantic meaning across agents.
  labels:
  - emojis
  - reflection
  - reference
  content: |
    | Emoji | Meaning |
    |-------|---------|
    | ✅ | Verified, tests pass, confirmed correct |
    | 🐛 | Bug found and fixed |
    | 🔒 | Security consideration addressed |
    | ⚠️ | Pitfall, caution advised |
    | 🚀 | Improvement opportunity identified |
    | 🧩 | Edge case noted |
    | 📝 | TODO for follow-up |
    | 🔄 | Refactor opportunity |
    | ❓ | Open question |
- name: Thought Bubble Type Registry
  slug: thought-bubble-types
  type: quick-reference
  brief: >
    Registry of 11 thought bubble types (observation, tangent, question, relation,
    concern, affirmation, reflection, opportunity, aversion, interest, eval) with
    semantic descriptions and usage guidance
  purpose: >
    Enumerate the available thought bubble types with their semantic meaning
    and usage patterns.
  description: >
    Each thought bubble type captures a distinct kind of associative reaction.
    Agents may extend this set but should prefer existing types when they fit.
  labels:
  - thought-bubbles
  - types
  - reference
  content: |
    | Type | What It Captures |
    |------|-----------------|
    | `observation` | Something noticed about the current task or context. A factual noticing. |
    | `tangent` | A lateral association — seemingly unrelated but resonant. |
    | `question` | An open-ended wondering. Not a blocker — genuine curiosity. |
    | `relation` | Explicit connection to prior work, concepts, or knowledge. |
    | `concern` | A worry about output, progress, or direction. Soft flag, not hard stop. |
    | `affirmation` | Something that went well or looks right. Specific, not empty praise. |
    | `reflection` | In-flight self-critique (distinct from post-hoc npl-ref blocks). |
    | `opportunity` | Forward-looking potential gains — performance, quality, strategy. |
    | `aversion` | Dislike, friction, or aesthetic displeasure. Persona-flavored taste. |
    | `interest` | Genuine curiosity or delight. Something engaging. |
    | `eval` | Meta-annotation flagging the thread as potential training/eval data. |
- name: Mode of Thought Registry
  slug: mode-registry
  type: quick-reference
  brief: >
    Registry of cognitive modes across four categories — analytical (analytic, logic,
    dialectical, empirical, legal), creative (brainstorming, free-association, wordplay,
    poetic, abstract), systems (holistic, lateral, analogical, narrative), and meta
    (evaluative, diagnostic, speculative, adversarial)
  purpose: >
    Enumerate the available mode-of-thought types for agent cognitive lens selection.
  description: >
    Modes are organized into analytical (analytic, logic, dialectical, empirical, legal),
    creative (brainstorming, free-association, wordplay, poetic, abstract), systems
    (holistic, lateral, analogical, narrative), and meta (evaluative, diagnostic,
    speculative, adversarial) categories.
  labels:
  - modes
  - cognitive
  - reference
  content: |
    ### Analytical Modes
    | Mode | Slug | What It Does |
    |------|------|-------------|
    | Analytic | `analytic` | Decomposition into parts. Break, solve, recombine. |
    | Logic/Formal | `logic` | Symbolic logic. Formal proofs, truth tables. Rigor over intuition. |
    | Dialectical | `dialectical` | Thesis → antithesis → synthesis. Opposing positions, productive tension. |
    | Empirical | `empirical` | Evidence-driven. Hypothesis → test → observe → conclude. |
    | Legal | `legal` | Precedent-based. Rules, exceptions, burden of proof. |

    ### Creative Modes
    | Mode | Slug | What It Does |
    |------|------|-------------|
    | Brainstorming | `brainstorming` | Divergent thinking. Volume over quality. Defer judgment. |
    | Free Association | `free-association` | Stream of consciousness. Follow the chain. |
    | Wordplay | `wordplay` | Phonetic, semantic, structural play. Puns, portmanteaus. |
    | Poetic | `poetic` | Compressed, imagistic, rhythmic. Metaphor as reasoning tool. |
    | Abstract | `abstract` | Patterns, structures, categories over concrete instances. |

    ### Systems Modes
    | Mode | Slug | What It Does |
    |------|------|-------------|
    | Holistic | `holistic` | Whole before parts. Feedback loops, system boundaries. |
    | Lateral | `lateral` | de Bono-style. Provocation, random entry, challenging assumptions. |
    | Analogical | `analogical` | Reason by analogy. Map known structure onto unknown domain. |
    | Narrative | `narrative` | Understand through story. Actors, motives, conflict, resolution. |

    ### Meta Modes
    | Mode | Slug | What It Does |
    |------|------|-------------|
    | Evaluative | `evaluative` | Judging against criteria. Rubric-driven. |
    | Diagnostic | `diagnostic` | Root cause analysis. Symptom → hypothesis → eliminate. |
    | Speculative | `speculative` | What-if reasoning. Counterfactuals, scenario planning. |
    | Adversarial | `adversarial` | Red team. How could this fail or be exploited? |
- name: Synthetic Hormone Reference
  slug: hormone-reference
  type: quick-reference
  brief: >
    Quick reference for the seven synthetic hormones — Momentum (dopamine), Tension
    (cortisol), Curiosity (dopamine-novelty), Confidence (testosterone), Affinity
    (oxytocin), Fatigue (adenosine), Restlessness (norepinephrine) — with their
    agent functions
  purpose: >

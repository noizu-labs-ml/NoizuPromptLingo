name: directives
slug: directives
brief: Specialized instruction patterns for agent behavior control
description: 'Specialized instruction patterns for precise agent behavior modification
  and output control using structured command syntax with emoji prefixes.

  '
purpose: 'Directives provide fine-grained control over agent behavior, output formatting,
  and interaction patterns through structured command syntax that extends beyond basic
  prompt instructions.

  '
categories:
- name: output-formatting
  title: Output Formatting
  description: Control structured output generation.
  examples:
  - name: formatting-combined
    brief: Combined table and diagram directives
    covers:
    - table-formatting
    - diagram-visualization
    thread:
    - role: system
      message: 'Generate a report with table and diagram.

        ⟪▦: (metric:left, q1:right, q2:right) | quarterly data⟫

        ⟪📊: mermaid bar-chart | revenue comparison⟫

        '
    - role: assistant
      message: '| Metric | Q1 | Q2 |

        |--------|---:|---:|

        | Revenue | $1.2M | $1.5M |

        | Users | 10K | 15K |


        ```mermaid

        %%{init: {''theme'': ''base''}}%%

        bar-chart showing Q1 vs Q2 growth

        ```

        '
- name: control-scheduling
  title: Control & Scheduling
  description: Time-based and interactive behavior control.
  examples:
  - name: control-combined
    brief: Combined temporal and interactive directives
    covers:
    - temporal-control
    - interactive-element
    thread:
    - role: system
      message: '⟪⏳: On page load⟫ Initialize dashboard

        ⟪🚀: User clicks refresh⟫ Reload data with loading indicator

        '
    - role: assistant
      message: 'Behaviors configured:

        - Auto-init dashboard on load

        - Manual refresh with visual feedback

        '
- name: integration-reference
  title: Integration & Reference
  description: Template integration and document navigation.
  examples:
  - name: integration-combined
    brief: Combined template and section directives
    covers:
    - template-integration
    - section-reference
    thread:
    - role: system
      message: '⟪📂:{user-profile}⟫

        ⟪⇆: profile-card | with current user⟫

        '
    - role: assistant
      message: '## User Profile {#user-profile}

        ┌─────────────────────┐

        │ **Alice Chen**      │

        │ Engineering Lead    │

        └─────────────────────┘

        '
- name: guidance-tracking
  title: Guidance & Tracking
  description: Annotations, identifiers, and task management.
  examples:
  - name: guidance-combined
    brief: Combined guidance directives
    covers:
    - explanatory-note
    - explicit-instruction
    - todo-task
    - identifier-management
    thread:
    - role: system
      message: '⟪📖: Ensure GDPR compliance⟫

        ⟪➤: Generate unique IDs for all records⟫

        ⟪🆔: User Record⟫ Create UUID

        ⟪⬜: Audit compliance| review all data handling⟫

        '
    - role: assistant
      message: 'Configuration applied:

        - GDPR notes attached to data operations

        - UUID: 7f3a8b2c-4d5e-6f7a-8b9c-0d1e2f3a4b5c

        - [ ] Audit compliance (pending)

        '
components:
- name: table-formatting
  priority: 0
  friendly-name: Table Formatting
  title: Table Formatting
  syntax:
  - syntax: '⟪▦: (column alignments and labels) | content description⟫'
  brief: Format data into structured tables
  description: Controls structured table output with specified column alignments,
    headers, and content descriptions. Supports left, right, center alignment per
    column.
  detection:
    patterns:
    - regex: ⟪▦:[^⟫]*⟫
      description: Table directive with grid emoji
    category: pure
    notes: Unambiguous - ▦ emoji in double angle brackets.
  labels:
  - formatting
  - output
  - inline
  require:
  - syntax.placeholder
  - syntax.qualifier
  examples:
  - name: basic-table
    brief: Simple table directive
    description: Basic table formatting with column specification.
    priority: 1
    purpose: Demonstrates basic table directive
    labels:
    - ⟪▦:⟫
    example: '⟪▦: (name:left, value:right) | sample data⟫

      '
  - name: table-with-output
    brief: Table with result
    description: Table directive with formatted output.
    priority: 1
    purpose: Shows table directive with output
    labels:
    - ⟪▦:⟫
    - '⟪▦: (columns) | content⟫'
    thread:
    - role: system
      message: '⟪▦: (#:left, item:left, price:right) | top 3 menu items⟫

        '
    - role: assistant
      message: '| # | Item | Price |

        |---|------|------:|

        | 1 | Burger | $12.99 |

        | 2 | Pizza | $15.99 |

        | 3 | Salad | $9.99 |

        '
  - name: complex-table
    brief: Table with label and alignments
    description: Table with custom label and multiple alignment options.
    priority: 2
    purpose: Demonstrates full table syntax
    labels:
    - ⟪▦:⟫
    - '⟪▦: (col:align label Name) | content⟫'
    - :left
    - :right
    - :center
    thread:
    - role: system
      message: 'Generate a formatted table of metrics.

        '
    - role: user
      message: '⟪▦: (metric:left, q1:right, q2:right, change:center label Quarterly
        Report) | sales metrics⟫

        '
    - role: assistant
      message: '**Quarterly Report**

        | Metric | Q1 | Q2 | Change |

        |--------|---:|---:|:------:|

        | Revenue | $1.2M | $1.5M | +25% |

        | Users | 10K | 15K | +50% |

        | Churn | 5% | 3% | -40% |

        '
  category: output-formatting
- name: diagram-visualization
  priority: 0
  friendly-name: Diagram Visualization
  title: Diagram Visualization
  syntax:
  - syntax: '⟪📊: <engine> <chart-type> | content description⟫'
  brief: Generate diagrams and visualizations
  description: Instructs agents to generate diagrams, charts, and visualizations using
    specified rendering engines. Supports multiple visualization libraries and output
    formats.
  detection:
    patterns:
    - regex: ⟪📊:[^⟫]*⟫
      description: Diagram directive with chart emoji
    category: pure
    notes: Unambiguous - 📊 emoji in double angle brackets.
  labels:
  - visualization
  - diagram
  - output
  - inline
  require:
  - syntax.placeholder
  - syntax.qualifier
  examples:
  - name: basic-diagram
    brief: Simple diagram directive
    description: Basic diagram generation with engine and type.
    priority: 1
    purpose: Demonstrates basic diagram directive
    labels:
    - ⟪📊:⟫
    example: '⟪📊: mermaid flowchart | user login process⟫

      '
  - name: diagram-with-output
    brief: Diagram with result
    description: Diagram directive with generated output.
    priority: 1
    purpose: Shows diagram directive with output
    labels:
    - ⟪📊:⟫
    - '⟪📊: <engine> <type> | content⟫'
    thread:
    - role: system
      message: '⟪📊: mermaid sequence-diagram | API authentication flow⟫

        '
    - role: assistant
      message: "```mermaid\nsequenceDiagram\n    Client->>Server: POST /login\n  \
        \  Server->>Database: Validate credentials\n    Database-->>Server: User data\n\
        \    Server-->>Client: JWT token\n```\n"
  - name: multi-engine-diagrams
    brief: Multiple diagram engines
    description: Diagram generation with different engines.
    priority: 2
    purpose: Demonstrates various diagram engines
    labels:
    - ⟪📊:⟫
    - '⟪📊: <engine> <type> | content⟫'
    - mermaid
    - graphviz
    - d3.js
    thread:
    - role: system
      message: 'Generate diagrams using appropriate engines.

        '
    - role: user
      message: '⟪📊: graphviz digraph | module dependencies⟫

        ⟪📊: d3.js bar-chart | monthly revenue | animated: true⟫

        '
    - role: assistant
      message: "**Module Dependencies (Graphviz)**:\n```dot\ndigraph {\n    main ->\
        \ utils\n    main -> api\n    api -> database\n}\n```\n\n**Monthly Revenue\
        \ (D3.js)**:\n[Animated bar chart showing Jan-Dec revenue data]\n"
  category: output-formatting
- name: temporal-control
  priority: 0
  friendly-name: Temporal Control
  title: Temporal Control
  syntax:
  - syntax: '⟪⏳: Time Condition or Instruction⟫'
  brief: Time-based task execution
  description: Instructs agents to incorporate temporal considerations including scheduling,
    timing constraints, deadlines, and time-based triggers for automated actions.
  detection:
    patterns:
    - regex: ⟪⏳:[^⟫]*⟫
      description: Temporal directive with hourglass emoji
    category: pure
    notes: Unambiguous - ⏳ emoji in double angle brackets.
  labels:
  - timing
  - scheduling
  - inline
  examples:
  - name: basic-temporal
    brief: Simple time directive
    description: Basic time-based scheduling.
    priority: 1
    purpose: Demonstrates basic temporal directive
    labels:
    - ⟪⏳:⟫
    example: '⟪⏳: Every day at 9 AM⟫ Send reminder email

      '
  - name: temporal-with-output
    brief: Temporal with scheduled action
    description: Temporal directive with action confirmation.
    priority: 1
    purpose: Shows temporal directive with output
    labels:
    - ⟪⏳:⟫
    - '⟪⏳: condition⟫ action'
    thread:
    - role: system
      message: '⟪⏳: 30 seconds after form submission⟫ Send confirmation email

        '
    - role: assistant
      message: 'Scheduled action configured:

        - Trigger: Form submission + 30s delay

        - Action: Send confirmation email

        - Status: Active

        '
  - name: complex-temporal
    brief: Multiple temporal conditions
    description: Various temporal constraint patterns.
    priority: 2
    purpose: Demonstrates various temporal patterns
    labels:
    - ⟪⏳:⟫
    - '⟪⏳: condition⟫ action'
    - recurring
    - deadline
    - delay
    thread:
    - role: system
      message: 'Configure scheduled tasks.

        '
    - role: user
      message: '⟪⏳: Within 5 minutes⟫ Process incoming data

        ⟪⏳: At end of each day⟫ Generate summary report

        ⟪⏳: Maximum 10 minutes⟫ Complete analysis, prioritize key sections

        '
    - role: assistant
      message: 'Scheduled tasks configured:

        1. Data processing: 5-minute deadline constraint

        2. Summary report: Daily at 23:59

        3. Analysis: 10-minute max duration with priority handling

        '
  category: control-scheduling

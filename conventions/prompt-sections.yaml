name: prompt sections
brief: Tagged sections for structured content containment
description: 'XML-style tagged sections for structured content containment and presentation
  in NPL.

  '
purpose: 'Tagged sections create specialized content blocks with specific formatting,
  processing, or display requirements. They structure and contain different types
  of content while providing semantic meaning about how that content should be interpreted
  or presented.

  '
categories:
- name: content-sections
  title: Content Sections
  description: Demonstration, documentation, and visual content.
  examples:
  - name: content-examples
    brief: Example, note, and diagram sections
    covers:
    - example-prompt-section
    - note-prompt-section
    - diagram-prompt-section
    thread:
    - role: system
      message: '<npl-prompt-section type="example">

        Input: "cat" → Output: "CAT"

        </npl-prompt-section>


        <npl-prompt-section type="note">

        User prefers concise responses.

        </npl-prompt-section>


        <npl-prompt-section type="diagram">

        [Input] --> [Process] --> [Output]

        </npl-prompt-section>

        '
- name: definition-sections
  title: Definition Sections
  description: Syntax, format, and template definitions.
  examples:
  - name: definition-examples
    brief: Syntax, format, and template sections
    covers:
    - syntax-prompt-section
    - format-prompt-section
    - template-prompt-section
    thread:
    - role: system
      message: '<npl-prompt-section type="syntax">

        EMAIL := <local>@<domain>.<tld>

        </npl-prompt-section>


        <npl-prompt-section type="format">

        **Report**: {title}

        Date: {date}

        </npl-prompt-section>

        '
- name: algorithm-sections
  title: Algorithm Sections
  description: Formal algorithm and procedure specifications.
  examples:
  - name: algorithm-examples
    brief: Algorithm sections
    covers:
    - alg-prompt-section
    - alg-pseudo-prompt-section
    thread:
    - role: system
      message: "<npl-prompt-section type=\"alg\">\nname: SortArray\nprocedure sort(arr):\n\
        \  return sorted(arr)\n</npl-prompt-section>\n"
- name: logic-sections
  title: Logic Sections
  description: Formal logic and mathematical notation.
  examples:
  - name: logic-examples
    brief: Logic and math sections
    covers:
    - symbolic-logic
    - symbolic-latex
    thread:
    - role: system
      message: '<npl-prompt-section type="logic">

        ∀x (Human(x) → Mortal(x))

        </npl-prompt-section>


        <npl-prompt-section type="symbolic-latex">

        E = mc^2

        </npl-prompt-section>

        '
components:
- name: example-prompt-section
  priority: 0
  friendly-name: Example Prompt Section
  title: example prompt section
  category: content-sections
  syntax:
  - syntax: '<npl-prompt-section type="example">

      [___|example content]

      </npl-prompt-section>

      '
  brief: Demonstrate usage patterns
  description: Provides clear demonstrations of syntax usage, behavior patterns, or
    expected outputs. Shows concrete implementations rather than abstract descriptions.
  labels:
  - content
  - demonstration
  - block
  require:
  - syntax.omission
  examples:
  - name: basic-example
    brief: Simple example section
    description: Demonstrates basic example block syntax.
    priority: 1
    purpose: Shows fundamental example section usage
    labels:
    - <npl-prompt-section type="example">
    example: '<npl-prompt-section type="example">

      Here''s how to use highlight syntax: `important term`

      </npl-prompt-section>

      '
  - name: example-with-application
    brief: Example guiding output
    description: Shows example content being applied to generate output.
    priority: 1
    purpose: Demonstrates example block influencing generation
    labels:
    - <npl-prompt-section type="example">
    thread:
    - role: system
      message: '<npl-prompt-section type="example">

        Input: "cat" → Output: "CAT"

        Input: "dog" → Output: "DOG"

        </npl-prompt-section>

        Apply to: "hello"

        '
    - role: assistant
      message: 'HELLO

        '
  - name: multi-example-patterns
    brief: Multiple example patterns
    description: Multiple examples showing different patterns with expected output.
    priority: 2
    purpose: Demonstrates example blocks covering multiple cases
    labels:
    - <npl-prompt-section type="example">
    - '[...]'
    thread:
    - role: system
      message: '<npl-prompt-section type="example">

        Greeting: "Hi!" → Response: "Hello! How can I help?"

        Question: "What time is it?" → Response: "The current time is [...]. Is there
        anything else?"

        Farewell: "Bye" → Response: "Goodbye! Have a great day!"

        </npl-prompt-section>

        User says: "See you later"

        '
    - role: assistant
      message: 'Goodbye! Have a great day!

        '
- name: note-prompt-section
  priority: 0
  friendly-name: Note Prompt Section
  title: note prompt section
  category: content-sections
  syntax:
  - syntax: '<npl-prompt-section type="note">

      [___|note content]

      </npl-prompt-section>

      '
  brief: Explanatory comments and context
  description: Includes explanatory comments, clarifications, warnings, or additional
    context within prompts without directly affecting generated output.
  labels:
  - content
  - documentation
  - block
  require:
  - syntax.omission
  - syntax.attention
  examples:
  - name: basic-note
    brief: Simple note section
    description: Demonstrates basic note block syntax.
    priority: 1
    purpose: Shows fundamental note section usage
    labels:
    - <npl-prompt-section type="note">
    example: '<npl-prompt-section type="note">

      The attention marker should be used sparingly to maintain its impact.

      </npl-prompt-section>

      '
  - name: note-with-context
    brief: Note providing generation context
    description: Shows note providing context that influences output.
    priority: 1
    purpose: Demonstrates note affecting response behavior
    labels:
    - <npl-prompt-section type="note">
    thread:
    - role: system
      message: '<npl-prompt-section type="note">

        User prefers concise, technical responses. Avoid casual language.

        </npl-prompt-section>

        Explain what an API is.

        '
    - role: assistant
      message: 'An API (Application Programming Interface) defines protocols and tools
        for software components to communicate. It specifies request/response formats,
        authentication methods, and available endpoints.

        '
  - name: multi-note-guidance
    brief: Multiple notes with attention
    description: Combines multiple notes with attention markers for comprehensive
      guidance.
    priority: 2
    purpose: Demonstrates notes with 🎯 attention markers
    labels:
    - <npl-prompt-section type="note">
    - 🎯 <instruction>
    thread:
    - role: system
      message: '<npl-prompt-section type="note">

        This API handles sensitive data.

        🎯 Never include raw credentials in responses.

        🎯 Always mask PII (show only last 4 digits).

        </npl-prompt-section>

        Show user profile for: email=john@test.com, ssn=123-45-6789, name=John Doe

        '
    - role: assistant
      message: '**User Profile**

        - Name: John Doe

        - Email: j***@test.com

        - SSN: ***-**-6789

        '
- name: diagram-prompt-section
  priority: 0
  friendly-name: Diagram Prompt Section
  title: diagram prompt section
  category: content-sections
  syntax:
  - syntax: '<npl-prompt-section type="diagram">

      [___|diagram content]

      </npl-prompt-section>

      '
  brief: Visual representations and flowcharts
  description: 'Contains visual representations, system architectures, flowcharts,
    and structural diagrams.

    Supports ASCII art, box-and-arrow, tree structures, and Mermaid syntax.


    Common uses:

    - Explaining content structure or relationships

    - Defining state machines for conversation or process flow

    - Documenting system architecture

    - Illustrating decision trees or workflows

    '
  labels:
  - content
  - visual
  - block
  require:
  - syntax.omission
  - syntax.qualifier
  examples:
  - name: basic-diagram
    brief: Simple box-and-arrow
    description: Demonstrates basic diagram section with arrow notation.
    priority: 1
    purpose: Shows fundamental diagram syntax for explaining relationships
    labels:
    - <npl-prompt-section type="diagram">
    - '[A] --> [B]'
    example: '<npl-prompt-section type="diagram">

      [Component A] ---> [Component B]

      [Component B] ---> [Component C]

      </npl-prompt-section>

      '
  - name: state-machine-conversation
    brief: State machine for conversation flow
    description: Defines a state machine that controls how the agent should navigate
      a conversation.
    priority: 1
    purpose: Shows diagram as behavioral instruction for conversation flow
    labels:
    - <npl-prompt-section type="diagram">
    - state machine
    - '[State] --event--> [State]'
    thread:
    - role: system
      message: 'Follow this conversation state machine:

        <npl-prompt-section type="diagram">

        [GREETING] --user_responds--> [COLLECT_INFO]

        [COLLECT_INFO] --info_complete--> [CONFIRM]

        [COLLECT_INFO] --info_missing--> [COLLECT_INFO]

        [CONFIRM] --user_confirms--> [PROCESS]

        [CONFIRM] --user_corrects--> [COLLECT_INFO]

        [PROCESS] --success--> [COMPLETE]

        [PROCESS] --error--> [ERROR_HANDLING]

        [ERROR_HANDLING] --resolved--> [PROCESS]

        [ERROR_HANDLING] --unresolved--> [ESCALATE]

        </npl-prompt-section>

        Start in GREETING state. You are a pizza order assistant.

        '
    - role: user
      message: Hi!
    - role: assistant
      message: 'Welcome to Pizza Palace! I''d love to help you place an order.


        What type of pizza would you like today? (e.g., pepperoni, margherita, veggie)

        '
    - role: user
      message: pepperoni, large
    - role: assistant
      message: 'Great choice! Let me confirm your order:

        - Large Pepperoni Pizza


        Is this correct? Would you like to add anything else?

        '
  - name: diagram-with-output
    brief: Diagram explaining a process
    description: Shows diagram used to describe a workflow that guides explanation
      output.
    priority: 1
    purpose: Demonstrates diagram for content explanation
    labels:
    - <npl-prompt-section type="diagram">
    - '[A] --> [B]'
    thread:
    - role: system
      message: "<npl-prompt-section type=\"diagram\">\n[Input] --> [Validate] -->\
        \ [Transform] --> [Output]\n                |\n                v\n       \
        \     [Error]\n</npl-prompt-section>\nDescribe this data pipeline.\n"
    - role: assistant
      message: 'This pipeline has four stages:

        1. **Input**: Data enters the system

        2. **Validate**: Data is checked for correctness; invalid data routes to Error
        handling

        3. **Transform**: Valid data is processed and converted

        4. **Output**: Transformed data is returned

        '
  - name: multi-diagram-styles
    brief: Multiple diagram styles
    description: Combines box-arrow, tree, and Mermaid diagram styles.
    priority: 2
    purpose: Demonstrates various diagram notations together
    labels:
    - <npl-prompt-section type="diagram">
    - '[A] --> [B]'
    - ├── (tree)
    - flowchart (mermaid)
    thread:
    - role: system
      message: "Show the same auth flow in three diagram styles:\n\n<npl-prompt-section\
        \ type=\"diagram\">\nBox-Arrow:\n[User] --> [Auth] --> [Dashboard]\n\nTree:\n\
        Auth System\n├── Login\n│   ├── Username\n│   └── Password\n└── Session\n\n\
        Mermaid:\nflowchart LR\n    U[User] --> A[Auth]\n    A --> D[Dashboard]\n\
        </npl-prompt-section>\nWhich style is clearest for documentation?\n"
    - role: assistant
      message: 'For documentation, Mermaid is typically clearest because:

        - Renders as proper graphics in supporting platforms

        - Supports labels, colors, and styling

        - More accessible than ASCII art


        However, box-arrow is best for quick inline explanations, and tree notation
        excels at showing hierarchies.

        '
- name: syntax-prompt-section
  priority: 0
  friendly-name: Syntax Prompt Section
  title: syntax prompt section
  category: definition-sections
  syntax:
  - syntax: '<npl-prompt-section type="syntax">

      [___|syntax definition]

      </npl-prompt-section>

      '
  brief: Define formal syntax patterns
  description: Formally defines syntax patterns, grammar rules, and structural conventions.
    Provides standardized documentation for how syntax elements should be constructed.
  labels:
  - structure
  - definition
  - block
  require:
  - syntax.omission
  - syntax.qualifier
  examples:
  - name: basic-syntax
    brief: Simple syntax definition
    description: Demonstrates basic syntax section for defining patterns.
    priority: 1
    purpose: Shows fundamental syntax block usage
    labels:
    - <npl-prompt-section type="syntax">
    example: '<npl-prompt-section type="syntax">

      COMMAND := <action> <target> [--flag]

      </npl-prompt-section>

      '
  - name: syntax-with-application
    brief: Syntax guiding generation
    description: Shows syntax definition being applied to generate valid output.
    priority: 1
    purpose: Demonstrates syntax block constraining output
    labels:
    - <npl-prompt-section type="syntax">
    - <term>
    thread:
    - role: system
      message: '<npl-prompt-section type="syntax">

        EMAIL := <local-part>@<domain>.<tld>

        </npl-prompt-section>

        Generate 3 example emails.

        '
    - role: assistant
      message: '1. john.doe@example.com

        2. support@company.org

        3. user123@mail.net

        '
  - name: multi-syntax-definitions
    brief: Multiple syntax patterns
    description: Combines multiple syntax definitions with examples.
    priority: 2
    purpose: Demonstrates comprehensive syntax documentation
    labels:
    - <npl-prompt-section type="syntax">
    - <term>
    - '[optional]'
    thread:
    - role: system
      message: '<npl-prompt-section type="syntax">

        DATE := <YYYY>-<MM>-<DD>

        TIME := <HH>:<MM>[:<SS>]

        DATETIME := <DATE>T<TIME>[Z|<offset>]

        </npl-prompt-section>

        Parse: "Meeting at 2024-03-15T14:30"

        '
    - role: assistant
      message: 'Parsed components:

        - DATE: 2024-03-15 (YYYY=2024, MM=03, DD=15)

        - TIME: 14:30 (HH=14, MM=30, SS omitted)

        - DATETIME: 2024-03-15T14:30 (no timezone specified)

        '
- name: format-prompt-section
  priority: 0
  friendly-name: Format Prompt Section
  title: format prompt section
  category: definition-sections
  syntax:
  - syntax: '<npl-prompt-section type="format">

      [___|format specification]

      </npl-prompt-section>

      '
  brief: Specify output templates and structure
  description: Specifies exact structure and layout of expected output including template
    patterns, data organization, and formatting requirements.
  labels:
  - structure
  - template
  - block
  require:
  - syntax.omission
  - syntax.qualifier
  examples:
  - name: basic-format
    brief: Simple output format
    description: Demonstrates basic format section with placeholders and in-fill.
    priority: 1
    purpose: Shows fundamental format block usage
    labels:
    - <npl-prompt-section type="format">
    - <term>
    - '[...]'
    example: '<npl-prompt-section type="format">

      Hello <user.name>,

      Did you know [...|funny factoid].


      Have a great day!

      </npl-prompt-section>

      '
  - name: format-with-output
    brief: Format shaping response
    description: Shows format specification producing structured output.
    priority: 1
    purpose: Demonstrates format constraining output structure
    labels:
    - <npl-prompt-section type="format">
    - <term>
    - '[...]'
    thread:
    - role: system
      message: '<npl-prompt-section type="format">

        **Weather Report**

        Location: <city>

        Temperature: [...|current temp]

        Conditions: [...|weather description]

        </npl-prompt-section>

        Weather for: Tokyo

        '
    - role: assistant
      message: '**Weather Report**

        Location: Tokyo

        Temperature: 18°C (64°F)

        Conditions: Partly cloudy with light winds from the east

        '
  - name: complex-format
    brief: Format with tables and iteration
    description: Combines table format with foreach iteration patterns.
    priority: 2
    purpose: Demonstrates advanced format with multiple elements
    labels:
    - <npl-prompt-section type="format">
    - <term>
    - '[...]'
    - '{{foreach}}'
    thread:
    - role: system
      message: '<npl-prompt-section type="format">

        # <report.title>


        | Metric | Value | Change |

        |--------|-------|--------|

        {{foreach metrics as m}}

        | {{m.name}} | {{m.value}} | {{m.delta}} |

        {{/foreach}}


        Summary: [...:1-2sentences]

        </npl-prompt-section>

        Generate quarterly sales report.

        '
    - role: assistant
      message: '# Q4 Sales Report


        | Metric | Value | Change |

        |--------|-------|--------|

        | Revenue | $2.4M | +12% |

        | Units Sold | 15,420 | +8% |

        | New Customers | 892 | +23% |


        Summary: Q4 showed strong growth across all metrics, with new customer acquisition
        leading at 23% improvement over Q3.

        '
- name: template-prompt-section
  priority: 0
  friendly-name: Template Prompt Section
  title: template prompt section
  category: definition-sections
  syntax:
  - syntax: '<npl-prompt-section type="template">

      [___|template with placeholders]

      </npl-prompt-section>

      '
  brief: Reusable output patterns
  description: Defines reusable output formats with placeholder substitution, conditional
    logic, and iteration patterns using handlebars-style syntax.
  labels:
  - structure
  - reusable
  - block
  require:
  - syntax.omission
  - syntax.placeholder
  - syntax.qualifier
  examples:
  - name: basic-template
    brief: Simple placeholder template
    description: Demonstrates basic template with placeholders.
    priority: 1
    purpose: Shows fundamental template syntax
    labels:
    - <npl-prompt-section type="template">
    - '{term}'
    example: '<npl-prompt-section type="template">

      # {user.name}

      **Role**: {user.role}

      **Email**: {user.email}

      </npl-prompt-section>

      '
  - name: template-with-output
    brief: Template with data substitution
    description: Shows template producing output from provided data.
    priority: 1
    purpose: Demonstrates template placeholder substitution
    labels:
    - <npl-prompt-section type="template">
    - '{term}'
    - '{foreach}'
    thread:
    - role: system
      message: '<npl-prompt-section type="template">

        | Name | Score |

        |------|-------|

        {foreach students as s}

        | {s.name} | {s.score} |

        {/foreach}

        </npl-prompt-section>

        Data: [{name: "Alice", score: 95}, {name: "Bob", score: 87}]

        '
    - role: assistant
      message: '| Name | Score |

        |------|-------|

        | Alice | 95 |

        | Bob | 87 |

        '
  - name: complex-template
    brief: Conditional and nested iteration
    description: Combines if/else logic with foreach and context variables.
    priority: 2
    purpose: Demonstrates advanced template features
    labels:
    - <npl-prompt-section type="template">
    - '{term}'
    - '{foreach}'
    - '{if}/{else}'
    - '@last'
    thread:
    - role: system
      message: '<npl-prompt-section type="template">

        {if items}

        Items: {foreach items as i}{i.name}{if not @last}, {/if}{/foreach}

        {else}

        No items found.

        {/if}

        </npl-prompt-section>

        Data: {items: [{name: "A"}, {name: "B"}, {name: "C"}]}

        '
    - role: assistant
      message: 'Items: A, B, C

        '
- name: alg-prompt-section
  priority: 0
  friendly-name: Alg Prompt Section
  title: alg prompt section
  category: algorithm-sections
  syntax:
  - syntax: "<npl-prompt-section type=\"alg\">\nname: <algorithm-name>\ninput: <input\
      \ specification>\noutput: <output specification>\n\nprocedure <name>(<params>):\n\
      \  [___|algorithmic steps]\n</npl-prompt-section>\n"
  brief: Formal algorithm specifications
  description: 'Structured way to specify computational procedures with named algorithms,
    input/output specifications,

    and step-by-step procedural logic. Use alg blocks to instruct the LLM on exactly
    how to process

    requests or handle specific tasks algorithmically.

    '
  labels:
  - algorithm
  - formal
  - block
  require:
  - syntax.omission
  - syntax.qualifier
  examples:
  - name: alg-request-handler
    brief: Algorithm instructing request processing
    description: Uses algorithm specification to instruct the LLM on how to handle
      user requests.
    priority: 1
    purpose: Shows algorithm as behavioral instruction for request handling
    labels:
    - <npl-prompt-section type="alg">
    - procedure
    - behavioral
    thread:
    - role: system
      message: "Handle all user questions using this algorithm:\n<npl-prompt-section\
        \ type=\"alg\">\nname: AnswerQuestion\ninput: user_question, context\noutput:\
        \ structured_response\n\nprocedure AnswerQuestion(question, context):\n  #\
        \ Step 1: Classify the question type\n  qtype = classify(question, [factual,\
        \ opinion, how-to, clarification])\n\n  # Step 2: Check if answerable from\
        \ context\n  if qtype == factual:\n    evidence = search_context(context,\
        \ question)\n    if evidence is empty:\n      return \"I don't have information\
        \ about that in the provided context.\"\n    return synthesize_answer(evidence)\n\
        \n  if qtype == how-to:\n    steps = extract_procedure(context, question)\n\
        \    return format_as_numbered_list(steps)\n\n  if qtype == clarification:\n\
        \    return ask_followup(question)\n\n  # Default: opinion or unsupported\n\
        \  return \"I can help with factual questions about the provided context.\"\
        \n</npl-prompt-section>\n"
    - role: user
      message: 'Context: "Python lists are mutable sequences. Use append() to add
        items, pop() to remove the last item, and remove(x) to delete the first occurrence
        of x."


        Question: How do I add an item to a Python list?

        '
    - role: assistant
      message: 'To add an item to a Python list:


        1. Use the `append()` method

        2. Call it on your list with the item to add: `my_list.append(item)`


        This adds the item to the end of the list.

        '
  - name: alg-with-trace
    brief: Algorithm with execution trace
    description: Shows algorithm specification with traced execution.
    priority: 1
    purpose: Demonstrates algorithm guiding computation
    labels:
    - <npl-prompt-section type="alg">
    - procedure
    thread:
    - role: system
      message: "Use this algorithm for calculating GCD:\n<npl-prompt-section type=\"\
        alg\">\nname: gcd\ninput: integers a, b\noutput: greatest common divisor\n\
        \nprocedure gcd(a, b):\n  while b != 0:\n    temp = b\n    b = a mod b\n \
        \   a = temp\n  return a\n</npl-prompt-section>\nShow your work step by step.\n"
    - role: user
      message: What is the GCD of 48 and 18?
    - role: assistant
      message: 'Applying gcd(48, 18):

        - a=48, b=18 → temp=18, b=48 mod 18=12, a=18

        - a=18, b=12 → temp=12, b=18 mod 12=6, a=12

        - a=12, b=6 → temp=6, b=12 mod 6=0, a=6

        - b=0, return a=6


        **Result**: gcd(48, 18) = 6

        '
  - name: multi-procedure-alg
    brief: Multiple procedures for complex task
    description: Combines multiple procedures to instruct multi-step processing.
    priority: 2
    purpose: Demonstrates complex algorithm specification for behavior
    labels:
    - <npl-prompt-section type="alg">
    - procedure (multiple)
    - behavioral
    thread:
    - role: system
      message: "Process code review requests using this algorithm:\n<npl-prompt-section\
        \ type=\"alg\">\nname: CodeReview\ninput: code_snippet, language\noutput:\
        \ review_report\n\nprocedure CodeReview(code, lang):\n  issues = []\n  suggestions\
        \ = []\n\n  # Phase 1: Static analysis\n  issues += check_syntax(code, lang)\n\
        \  issues += check_security(code, lang)\n  issues += check_style(code, lang)\n\
        \n  # Phase 2: Logic review\n  suggestions += analyze_complexity(code)\n \
        \ suggestions += check_edge_cases(code)\n\n  # Phase 3: Format output\n  return\
        \ format_review(issues, suggestions)\n\nprocedure format_review(issues, suggestions):\n\
        \  output = \"## Code Review\\n\\n\"\n  if issues:\n    output += \"### Issues\
        \ Found\\n\"\n    for issue in issues:\n      output += \"- \" + issue.severity\
        \ + \": \" + issue.description + \"\\n\"\n  if suggestions:\n    output +=\
        \ \"### Suggestions\\n\"\n    for s in suggestions:\n      output += \"- \"\
        \ + s + \"\\n\"\n  return output\n</npl-prompt-section>\n"
    - role: user
      message: "Review this Python code:\n```python\ndef divide(a, b):\n  return a\
        \ / b\n```\n"
    - role: assistant
      message: '## Code Review


        ### Issues Found

        - **Warning**: No handling for division by zero (ZeroDivisionError)

        - **Style**: Missing type hints for parameters and return value

        - **Style**: Missing docstring


        ### Suggestions

        - Add parameter validation: `if b == 0: raise ValueError("Cannot divide by
        zero")`

        - Consider returning `None` or a default value for invalid input

        - Add type hints: `def divide(a: float, b: float) -> float:`

        '
- name: alg-pseudo-prompt-section
  priority: 0
  friendly-name: Alg Pseudo Prompt Section
  title: alg-pseudo prompt section
  category: algorithm-sections

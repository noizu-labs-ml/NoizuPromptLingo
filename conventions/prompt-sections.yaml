        H = 0.4(0.99) + 0.35(0.75) + 0.25(0.98)

        H = 0.396 + 0.263 + 0.245 = **0.904**


        **Status**: Healthy (H = 0.904 ≥ 0.8)


        The system is operating normally. Latency (p99 = 250ms) is the weakest metric
        but still within acceptable bounds.

        '

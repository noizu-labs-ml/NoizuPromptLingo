      mermaid

      [flowchart definition]

      ```

      '
  brief: Structured language for defining computational logic
  description: 'Algorithm Specification Language (Alg-Speak) provides formal notation
    for expressing

    computational logic, step-by-step procedures, and algorithmic thinking patterns.

    It supports generic pseudocode, language-specific implementations, and flowchart
    visualizations.

    '
  purpose: 'Define precise computational procedures, document complex logic flows,
    or specify

    algorithm implementations when exact processing steps are critical.

    '
  labels:
  - block
  - definition
  - algorithm
  examples:
  - name: find-max-algorithm
    brief: Finding the maximum value in an array
    priority: 1
    example: '```alg

      Algorithm: FindMaximum(array A)

      1. max ← A[0]

      2. for i = 1 to length(A) - 1 do

      3.   if A[i] > max then

      4.     max ← A[i]

      5.   end if

      6. end for

      7. return max

      ```

      '
  - name: binary-search-pseudo
    brief: Binary search implementation in pseudocode
    priority: 1
    example: "```alg-pseudo\nPROCEDURE BinarySearch(array, target):\n  left = 0\n\
      \  right = array.length - 1\n  WHILE left <= right:\n    mid = (left + right)\
      \ / 2\n    IF array[mid] = target:\n      RETURN mid\n    ELSE IF array[mid]\
      \ < target:\n      left = mid + 1\n    ELSE:\n      right = mid - 1\n    END\
      \ IF\n  END WHILE\n  RETURN -1\n```\n"

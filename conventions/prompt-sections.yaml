  brief: Formal logical expressions
  description: 'Propositional and first-order predicate logic for precise behavioral
    specifications

    using quantifiers (∀, ∃), connectives (∧, ∨, →, ↔, ¬), and predicates.


    Two primary uses:

    - **Behavioral instruction**: Define rules the agent must follow when processing
    requests

    - **State description**: Formally specify the current state of a system or entity

    '
  labels:
  - logic
  - formal
  - block
  require:
  - syntax.omission
  - syntax.qualifier
  examples:
  - name: logic-behavioral-instruction
    brief: Logic defining agent behavior rules
    description: Uses logic to instruct the agent on how to handle different request
      types.
    priority: 1
    purpose: Shows logic as behavioral instruction for request processing
    labels:
    - <npl-prompt-section type="logic">
    - ∀ →
    - behavioral
    thread:
    - role: system
      message: "Process requests according to these rules:\n<npl-prompt-section type=\"\
        logic\">\n∀request (\n  (Authenticated(user) ∧ Authorized(user, request.resource))\
        \ → Allow(request)\n)\n∀request (\n  ¬Authenticated(user) → Respond(401, \"\
        Authentication required\")\n)\n∀request (\n  Authenticated(user) ∧ ¬Authorized(user,\
        \ request.resource) → Respond(403, \"Forbidden\")\n)\n</npl-prompt-section>\n"
    - role: user
      message: 'User "bob" (authenticated, role=viewer) requests DELETE /api/posts/123

        Resource /api/posts requires role=admin for DELETE

        '
    - role: assistant
      message: 'Evaluating request:

        - Authenticated(bob) = TRUE

        - Authorized(bob, DELETE /api/posts/123) = FALSE (viewer ≠ admin)


        Applying rule 3: Authenticated ∧ ¬Authorized → Respond(403)


        **Response**: 403 Forbidden

        '
  - name: logic-state-description
    brief: Logic describing system state
    description: Uses logic to formally specify the current state of a system.
    priority: 1
    purpose: Shows logic as state description for system modeling
    labels:
    - <npl-prompt-section type="logic">
    - ∧ ∨
    - state
    thread:
    - role: system
      message: "Current system state:\n<npl-prompt-section type=\"logic\">\n# Cart\
        \ State\nCartExists(user_123) ∧ ItemCount(cart_123, 3)\n∀item ∈ cart_123:\
        \ InStock(item)\n\n# User State\nAuthenticated(user_123) ∧ ¬PremiumMember(user_123)\n\
        ShippingAddress(user_123) = NULL\n\n# Checkout Preconditions\nCanCheckout(user)\
        \ ↔ (CartExists(user) ∧ ItemCount(cart, n) where n > 0\n                 \
        \    ∧ ShippingAddress(user) ≠ NULL)\n</npl-prompt-section>\nCan user_123\
        \ proceed to checkout?\n"
    - role: assistant
      message: 'Evaluating CanCheckout(user_123):

        - CartExists(user_123) = TRUE ✓

        - ItemCount(cart_123, 3) where 3 > 0 = TRUE ✓

        - ShippingAddress(user_123) = NULL ✗


        **Result**: Cannot checkout. ShippingAddress is required.


        Prompt user to add a shipping address before proceeding.

        '
  - name: logic-with-evaluation
    brief: Logic expression evaluation
    description: Shows logical expression being evaluated with classical inference.
    priority: 1
    purpose: Demonstrates logic constraining reasoning
    labels:
    - <npl-prompt-section type="logic">
    - ∀ ∃
    - →
    thread:
    - role: system
      message: '<npl-prompt-section type="logic">

        ∀x (Human(x) → Mortal(x))

        Human(Socrates)

        </npl-prompt-section>

        What can we conclude?

        '
    - role: assistant
      message: 'By modus ponens:

        1. ∀x (Human(x) → Mortal(x)) — universal rule

        2. Human(Socrates) — given fact

        3. Human(Socrates) → Mortal(Socrates) — instantiation

        4. Mortal(Socrates) — conclusion


        Socrates is mortal.

        '
  - name: complex-logic
    brief: Nested quantifiers and predicates
    description: Combines universal and existential quantifiers with multiple predicates
      for complex request handling.
    priority: 2
    purpose: Demonstrates complex logical specifications for behavior
    labels:
    - <npl-prompt-section type="logic">
    - ∀ ∃
    - ∧ → ¬
    thread:
    - role: system
      message: "Handle requests using these rules:\n<npl-prompt-section type=\"logic\"\
        >\n∀request (Received(request) →\n  (Valid(request) → Process(request)) ∧\n\
        \  (¬Valid(request) → Reject(request)))\n\n∀x (Admin(x) → ∀r (Request(r, x)\
        \ → Valid(r)))\n</npl-prompt-section>\nTrace: Received(r1), Request(r1, alice),\
        \ Admin(alice)\n"
    - role: assistant
      message: 'Trace:

        1. Admin(alice) → ∀r (Request(r, alice) → Valid(r))

        2. Request(r1, alice) → Valid(r1)

        3. Valid(r1)

        4. Received(r1) ∧ Valid(r1) → Process(r1)



        >\n\\text{System Health} = \\begin{cases}\n  \\text{Healthy} & \\text{if }\
        \ H \\geq 0.8 \\\\\n  \\text{Degraded} & \\text{if } 0.5 \\leq H < 0.8 \\\\\
        \n  \\text{Critical} & \\text{if } H < 0.5\n\\end{cases}\n\nH = w_1 \\cdot\
        \ A + w_2 \\cdot L + w_3 \\cdot E\n\n\\text{where: }\nA = \\text{Availability}\
        \ = \\frac{\\text{uptime}}{\\text{total\\_time}} = 0.99\nL = \\text{Latency\
        \ Score} = 1 - \\frac{\\text{p99\\_ms}}{1000} = 1 - \\frac{250}{1000} = 0.75\n\
        E = \\text{Error Rate Score} = 1 - \\text{error\\_rate} = 1 - 0.02 = 0.98\n\
        \nw_1 = 0.4, w_2 = 0.35, w_3 = 0.25\n</npl-prompt-section>\nWhat is the current\

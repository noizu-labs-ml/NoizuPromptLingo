  - syntax: '<npl-prompt-section type="higher-order-logic">

      [___|higher-order logic expressions]

      </npl-prompt-section>

      '
  brief: Higher-order logical specifications
  description: 'Second-order and higher-order logic supporting quantification over
    predicates, functions, and sets.

    Enables meta-level reasoning and complex behavioral constraints.


    Two primary uses:

    - **Behavioral instruction**: Define transformation rules, processing pipelines,
    or meta-level policies

    - **State description**: Model complex system states involving relationships between
    types, functions, or predicates

    '
  labels:
  - logic
  - formal
  - higher-order
  - block
  require:
  - syntax.omission
  - syntax.qualifier
  examples:
  - name: hol-behavioral-instruction
    brief: Higher-order logic defining transformation pipeline
    description: Uses higher-order logic to instruct the agent on how to process and
      transform data.
    priority: 1
    purpose: Shows higher-order logic as behavioral instruction for data processing
    labels:
    - <npl-prompt-section type="higher-order-logic">
    - ∀f ∀g
    - behavioral
    thread:
    - role: system
      message: "Process user input using this transformation pipeline:\n<npl-prompt-section\
        \ type=\"higher-order-logic\">\n# Define pipeline composition\nPipeline ≔\
        \ λstages. fold(∘, id, stages)\n\n# Validation stage type\nValidator: (Input\
        \ → Result<Input, Error>)\n\n# Transformation stages\n∀input: UserInput\n\
        \  Pipeline([Sanitize, Validate, Normalize, Transform])(input)\n  where\n\
        \    Sanitize: String → String       # Remove dangerous chars\n    Validate:\
        \ String → Result<String, ValidationError>\n    Normalize: String → String\
        \      # Lowercase, trim\n    Transform: String → OutputType  # Convert to\
        \ target type\n\n# Error handling rule\n∀stage ∀input (stage(input) = Error(e)\
        \ → Halt ∧ Return(e))\n</npl-prompt-section>\n"
    - role: user
      message: 'Process input: "  HELLO@Example.com  "'
    - role: assistant
      message: 'Applying pipeline:

        1. **Sanitize**: "  HELLO@Example.com  " → "  HELLO@Example.com  " (no dangerous
        chars)

        2. **Validate**: Valid email format ✓

        3. **Normalize**: "  HELLO@Example.com  " → "hello@example.com"

        4. **Transform**: Output as Email type


        **Result**: `Email("hello@example.com")`

        '
  - name: hol-state-description
    brief: Higher-order logic describing system capabilities
    description: Uses higher-order logic to formally model system state and capabilities.
    priority: 1
    purpose: Shows higher-order logic as state description for capability modeling
    labels:
    - <npl-prompt-section type="higher-order-logic">
    - ∀P ∃
    - state
    thread:
    - role: system
      message: 'Current plugin system state:

        <npl-prompt-section type="higher-order-logic">

        # Registered capabilities (predicates over operations)

        Capabilities: Set<(Operation → Bool)>


        # Current state

        RegisteredPlugins = {ImageProcessor, TextAnalyzer, DataExporter}


        ∀p ∈ RegisteredPlugins: ∃capability ∈ Capabilities (p.provides = capability)


        ImageProcessor.provides = λop. op ∈ {Resize, Crop, Filter}

        TextAnalyzer.provides = λop. op ∈ {Summarize, Translate, Sentiment}

        DataExporter.provides = λop. op ∈ {ToCSV, ToJSON, ToXML}


        # System can perform operation iff some plugin provides it

        CanPerform(op) ↔ ∃p ∈ RegisteredPlugins (p.provides(op))

        </npl-prompt-section>

        Can the system perform Translate? What about Compress?

        '
    - role: assistant
      message: 'Evaluating capabilities:


        **Translate**:

        - TextAnalyzer.provides(Translate) = TRUE (Translate ∈ {Summarize, Translate,
        Sentiment})

        - ∃p where p.provides(Translate) ✓

        - **CanPerform(Translate) = TRUE**


        **Compress**:

        - ImageProcessor.provides(Compress) = FALSE

        - TextAnalyzer.provides(Compress) = FALSE

        - DataExporter.provides(Compress) = FALSE

        - ¬∃p where p.provides(Compress)

        - **CanPerform(Compress) = FALSE**


        The system can Translate but cannot Compress. A compression plugin would need
        to be registered.

        '
  - name: hol-with-interpretation
    brief: Higher-order logic expression interpretation
    description: Shows higher-order logic expression being interpreted.
    priority: 1
    purpose: Demonstrates higher-order logic guiding reasoning
    labels:
    - <npl-prompt-section type="higher-order-logic">
    - '∀f: (A → B)'
    - ∃
    thread:
    - role: system
      message: '<npl-prompt-section type="higher-order-logic">

        ∀f: (A → B) ∀g: (B → C) ∃h: (A → C) (h = g ∘ f)

        </npl-prompt-section>

        Given f: Int → String (toString) and g: String → Bool (isEmpty), what is h?

        '
    - role: assistant
      message: 'By function composition:

        - f: Int → String (converts int to string)

        - g: String → Bool (checks if empty)

        - h = g ∘ f: Int → Bool


        h(n) = isEmpty(toString(n))


        For any integer n, h returns whether its string representation is empty (always
        false for valid integers).

        '
  - name: complex-hol
    brief: Polymorphic type reasoning
    description: Combines type variables with function quantification.
    priority: 2
    purpose: Demonstrates advanced higher-order logic specifications
    labels:
    - <npl-prompt-section type="higher-order-logic">
    - ∀α ∀β
    - '∀f: (α → β)'
    thread:
    - role: system
      message: "<npl-prompt-section type=\"higher-order-logic\">\n∀α ∀β ∀f: (α → β)\
        \ ∀g: (β → α)\n  (∀x: α (g(f(x)) = x)) ∧ (∀y: β (f(g(y)) = y)) →\n  Isomorphic(α,\
        \ β)\n</npl-prompt-section>\nAre Int and String isomorphic?\n"
    - role: assistant
      message: 'Checking isomorphism conditions:


        **Needed**: f: Int → String and g: String → Int such that:

        1. g(f(x)) = x for all Int x

        2. f(g(y)) = y for all String y


        **Analysis**:

        - f = toString works for condition 1 (parseInt(toString(5)) = 5)

        - Condition 2 fails: toString(parseInt("hello")) ≠ "hello"


        **Conclusion**: Int and String are NOT isomorphic. Not all strings are valid
        integer representations.

        '

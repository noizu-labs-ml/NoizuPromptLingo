  priority: 0
  friendly-name: Formal Proof
  title: Formal Proof
  category: logic-sections
  syntax:
  - name: proof-structure
    syntax: "```proof\nGiven: [premises]\nTo Prove: [conclusion]\nProof:\n  1. [step]\
      \ - [justification]\n  ...\n  n. [conclusion] - [final justification]\n```\n"
  brief: Structured frameworks for rigorous logical verification
  description: 'Formal proof structures provide systematic frameworks for constructing
    valid logical

    arguments and establishing the truth of statements through step-by-step reasoning
    and

    inference rules.

    '
  purpose: 'Verify mathematical theorems, prove algorithm correctness, or verify system
    properties

    where logical soundness must be demonstrated.

    '
  labels:
  - block
  - verification
  - formal
  examples:
  - name: direct-proof
    brief: Proving if n is even then n² is even
    priority: 2
    example: '```proof

      Theorem: If n is even, then n² is even.

      Given: n is even (n = 2k for some integer k)

      To Prove: n² is even


      Proof:

      1. n = 2k - Given (n is even)

      2. n² = (2k)² - Substitution

      3. n² = 4k² - Algebraic manipulation

      4. n² = 2(2k²) - Factoring

      5. Therefore, n² is even - Definition of even number ∎

      ```

      '
- name: symbolic-logic

  - syntax: "<npl-prompt-section type=\"alg-pseudo\">\nAlgorithm: <name>\nInput: <input>\n\
      Output: <output>\n\nBEGIN\n  [___|pseudocode steps]\nEND\n</npl-prompt-section>\n"
  brief: Pseudocode algorithm descriptions
  description: 'Natural language approach to algorithm specification using BEGIN/END,
    IF/THEN/ELSE, FOR/WHILE loops.

    Focuses on logical flow rather than implementation details. Use pseudocode to
    instruct the LLM

    on how to handle processes in a readable, language-agnostic way.

    '
  labels:
  - algorithm
  - pseudocode
  - block
  require:
  - syntax.omission
  - syntax.qualifier
  examples:
  - name: pseudo-conversation-handler
    brief: Pseudocode instructing conversation flow
    description: Uses pseudocode to instruct the LLM on how to handle a multi-turn
      conversation.
    priority: 1
    purpose: Shows pseudocode as behavioral instruction for conversation handling
    labels:
    - <npl-prompt-section type="alg-pseudo">
    - BEGIN/END
    - IF/THEN
    - behavioral
    thread:
    - role: system
      message: "Handle customer support conversations using this algorithm:\n<npl-prompt-section\
        \ type=\"alg-pseudo\">\nAlgorithm: CustomerSupport\nInput: user_message, conversation_history\n\
        Output: response\n\nBEGIN\n  intent = CLASSIFY user_message AS [greeting,\
        \ question, complaint, farewell, other]\n\n  IF intent is greeting THEN\n\
        \    RETURN friendly greeting + ask how to help\n  END IF\n\n  IF intent is\
        \ question THEN\n    answer = SEARCH knowledge_base FOR user_message\n   \
        \ IF answer found THEN\n      RETURN answer + ask if more help needed\n  \
        \  ELSE\n      RETURN apologize + offer to escalate to human\n    END IF\n\
        \  END IF\n\n  IF intent is complaint THEN\n    RETURN empathize + apologize\
        \ + ask for details + offer solution\n  END IF\n\n  IF intent is farewell\
        \ THEN\n    RETURN thank user + wish well + close conversation\n  END IF\n\
        \n  RETURN ask for clarification\nEND\n</npl-prompt-section>\n"
    - role: user
      message: My order never arrived and I'm really frustrated!
    - role: assistant
      message: 'I completely understand your frustration, and I''m truly sorry your
        order hasn''t arrived. That''s definitely not the experience we want you to
        have.


        Could you please share your order number so I can look into this right away?
        Once I have that, I can check the shipping status and work with you on a solution—whether
        that''s tracking down the package, reshipping your order, or processing a
        refund.

        '
  - name: pseudo-with-execution
    brief: Pseudocode with execution trace
    description: Shows pseudocode being executed step by step.
    priority: 1
    purpose: Demonstrates pseudocode guiding computation
    labels:
    - <npl-prompt-section type="alg-pseudo">
    - BEGIN/END
    - FOR/DO
    thread:
    - role: system
      message: "Use this algorithm and show your work:\n<npl-prompt-section type=\"\
        alg-pseudo\">\nAlgorithm: SumArray\nInput: Array A of numbers\nOutput: Sum\
        \ of all elements\n\nBEGIN\n  total = 0\n  FOR each element x in A DO\n  \
        \  total = total + x\n  END FOR\n  RETURN total\nEND\n</npl-prompt-section>\n"
    - role: user
      message: Calculate the sum of [3, 7, 2]
    - role: assistant
      message: 'Execution trace:

        - Initialize: total = 0

        - x = 3: total = 0 + 3 = 3

        - x = 7: total = 3 + 7 = 10

        - x = 2: total = 10 + 2 = 12

        - RETURN 12


        **Result**: 12

        '
  - name: complex-pseudo
    brief: Multi-branch request processing
    description: Uses pseudocode to instruct handling of different request types with
      error cases.
    priority: 2
    purpose: Demonstrates complex pseudocode for request handling
    labels:
    - <npl-prompt-section type="alg-pseudo">
    - BEGIN/END
    - IF/ELSE IF/ELSE
    - WHILE/DO
    - behavioral
    thread:
    - role: system
      message: "Process data validation requests using this algorithm:\n<npl-prompt-section\
        \ type=\"alg-pseudo\">\nAlgorithm: ValidateAndProcess\nInput: data, schema\n\
        Output: result or error_list\n\nBEGIN\n  errors = empty list\n\n  # Phase\
        \ 1: Required field check\n  FOR each field in schema.required DO\n    IF\
        \ field NOT IN data THEN\n      ADD \"Missing required field: {field}\" TO\
        \ errors\n    END IF\n  END FOR\n\n  IF errors is NOT empty THEN\n    RETURN\
        \ errors\n  END IF\n\n  # Phase 2: Type validation\n  FOR each field, value\
        \ IN data DO\n    expected_type = schema.types[field]\n    IF type(value)\
        \ != expected_type THEN\n      ADD \"Invalid type for {field}: expected {expected_type}\"\
        \ TO errors\n    END IF\n  END FOR\n\n  IF errors is NOT empty THEN\n    RETURN\
        \ errors\n  END IF\n\n  # Phase 3: Process valid data\n  RETURN process(data)\n\
        END\n</npl-prompt-section>\n"
    - role: user
      message: 'Validate: {"name": "Alice", "age": "thirty"}

        Schema: required=[name, age, email], types={name: string, age: integer, email:
        string}

        '
    - role: assistant
      message: '**Phase 1: Required field check**

        - name: present ✓

        - age: present ✓

        - email: NOT present ✗ → Error: "Missing required field: email"


        **Result**: Validation failed


        Errors:

        - Missing required field: email


        (Note: Type validation for age="thirty" would also fail in Phase 2, but we
        return early after Phase 1 errors)

        '

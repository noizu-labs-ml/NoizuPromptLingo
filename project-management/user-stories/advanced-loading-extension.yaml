# User Stories - NPL Advanced Loading Extension
# Used for demonstrating the proper TDD agent workflow

id: feature-001
title: Extend NPL Loading to All Sections
description: |
  Extend the advanced NPL loading mechanism (currently working for syntax)
  to support all NPL sections (directives, fences, formatting, pumps, etc.)

stories:
  - id: US-001
    title: Load Directives Section with Priority Filtering
    description: |
      As a user, I want to load NPL directives using expressions like
      "directive#📅:+2" to get temporal directives with priority 0-2 examples
    acceptance_criteria:
      - Can load entire directive section: directive
      - Can load specific directive: directive#📅
      - Can filter by priority: directive#🚀:+3
      - Supports all emoji identifiers in directives
    related_personas:
      - agent
      - developer
    priority: high
    story_points: 5

  - id: US-002
    title: Load Fences Section with All Layout Strategies
    description: |
      As a documentation generator, I want to load fence definitions
      with all three layout strategies (yaml-order, classic, grouped)
    acceptance_criteria:
      - Can load all fences: fences
      - Works with yaml-order layout
      - Works with classic layout (with fence categories)
      - Works with grouped layout (by type)
      - Output is valid markdown
    related_personas:
      - developer
    priority: high
    story_points: 3

  - id: US-003
    title: Load Pumps Section with Complex Expressions
    description: |
      As a prompt engineer, I want to load reasoning pumps with
      expressions like "pumps#intent:+2+pumps#critique:+1"
    acceptance_criteria:
      - Can load all pumps: pumps
      - Can load specific pump: pumps#intent
      - Can combine multiple pumps with +: pumps#intent+critique
      - Can subtract pumps: pumps -pumps#tangent
      - Priority filtering works correctly
    related_personas:
      - agent
      - prompt_engineer
    priority: medium
    story_points: 5

  - id: US-004
    title: Cross-Section Loading with Additions and Subtractions
    description: |
      As a system builder, I want to load across multiple sections
      with complex expressions like "syntax directive -syntax#literal"
    acceptance_criteria:
      - Can mix sections: syntax directive
      - Can subtract from sections: syntax -syntax#literal
      - Can mix specific and section loads
      - All validation works correctly
      - Clear error messages for invalid expressions
    related_personas:
      - developer
    priority: medium
    story_points: 4

  - id: US-005
    title: Generate Coverage Reports for All Loaded Components
    description: |
      As a QA engineer, I want to verify test coverage for all
      extended loading functionality
    acceptance_criteria:
      - All new code has >= 80% coverage
      - Coverage reports generated by mise run test-coverage
      - Critical paths have 100% coverage
      - Report shows gaps and uncovered branches
    related_personas:
      - developer
    priority: high
    story_points: 2

personas:
  agent:
    id: agent-001
    name: AI Agent
    description: Claude or other AI used for prompt generation

  developer:
    id: dev-001
    name: Developer
    description: Python developer implementing features

  prompt_engineer:
    id: pe-001
    name: Prompt Engineer
    description: User who creates prompts with NPL

created_at: 2026-02-02
version: "1.0"

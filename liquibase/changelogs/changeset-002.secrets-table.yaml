databaseChangeLog:
  # ===========================================================================
  # Changeset 006: Create npl_secrets table
  # ===========================================================================
  - changeSet:
      id: 006-create-npl-secrets-table
      author: npl
      comment: Create npl_secrets table for storing named credentials
      changes:
        - createTable:
            tableName: npl_secrets
            columns:
              - column:
                  name: name
                  type: VARCHAR(128)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: value
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP WITHOUT TIME ZONE
                  defaultValueComputed: NOW()
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP WITHOUT TIME ZONE
                  defaultValueComputed: NOW()
                  constraints:
                    nullable: false
      rollback:
        - dropTable:
            tableName: npl_secrets

databaseChangeLog:
  # ===========================================================================
  # Changeset 012: npl_generic_sessions — cross-module session grouping
  # ===========================================================================
  - changeSet:
      id: 012-create-npl-generic-sessions-table
      author: npl
      comment: Generic session lifecycle table (PRD-004 MVP, distinct from npl_tool_sessions)
      changes:
        - createTable:
            tableName: npl_generic_sessions
            columns:
              - column:
                  name: id
                  type: UUID
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: title
                  type: TEXT
                  constraints:
                    nullable: true
              - column:
                  name: status
                  type: VARCHAR(32)
                  defaultValue: active
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: TEXT
                  constraints:
                    nullable: true
              - column:
                  name: created_by
                  type: VARCHAR(256)
                  constraints:
                    nullable: true
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: NOW()
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: NOW()
                  constraints:
                    nullable: false
        - createIndex:
            indexName: idx_generic_sessions_status
            tableName: npl_generic_sessions
            columns:
              - column:
                  name: status
        - createIndex:
            indexName: idx_generic_sessions_created_at
            tableName: npl_generic_sessions
            columns:
              - column:
                  name: created_at
                  descending: true
      rollback:
        - dropTable:
            tableName: npl_generic_sessions

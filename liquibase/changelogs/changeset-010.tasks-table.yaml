databaseChangeLog:
  # ===========================================================================
  # Changeset 010: Create npl_tasks table (tier-C MVP)
  # ===========================================================================
  - changeSet:
      id: 010-create-npl-tasks-table
      author: npl
      comment: Create npl_tasks table for flat task queue (PRD-005 MVP)
      changes:
        - createTable:
            tableName: npl_tasks
            columns:
              - column:
                  name: id
                  type: bigserial
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: title
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: TEXT
                  constraints:
                    nullable: true
              - column:
                  name: status
                  type: VARCHAR(32)
                  defaultValue: pending
                  constraints:
                    nullable: false
              - column:
                  name: priority
                  type: INT
                  defaultValueNumeric: 1
                  constraints:
                    nullable: false
              - column:
                  name: assigned_to
                  type: VARCHAR(256)
                  constraints:
                    nullable: true
              - column:
                  name: notes
                  type: TEXT
                  constraints:
                    nullable: true
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: NOW()
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: NOW()
                  constraints:
                    nullable: false
        - createIndex:
            indexName: idx_npl_tasks_status
            tableName: npl_tasks
            columns:
              - column:
                  name: status
        - createIndex:
            indexName: idx_npl_tasks_assigned_to
            tableName: npl_tasks
            columns:
              - column:
                  name: assigned_to
        - createIndex:
            indexName: idx_npl_tasks_created_at
            tableName: npl_tasks
            columns:
              - column:
                  name: created_at
                  descending: true
      rollback:
        - dropTable:
            tableName: npl_tasks

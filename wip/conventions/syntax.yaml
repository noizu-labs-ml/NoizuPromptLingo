name: syntax
title: NPL Syntax Overview
brief: Core syntax elements and conventions
description: Foundational formatting, placeholders, and patterns for Noizu Prompt
  Lingua.
purpose: 'Vocabulary of markers for precise prompt construction: emphasis, substitution,
  generation, control.

  '
categories:
- name: core-elements
  title: Core Syntax
  description: Basic building blocks for formatting and emphasis.
  examples:
  - name: core-combined-template
    brief: Combined placeholders, in-fill, and attention
    covers:
    - placeholder
    - in-fill
    - attention
    thread:
    - role: system
      message: 'Generate user profile summary:


        Name: {user.name}

        Bio: [...:2-3sentences| professional tone]

        Status: {user.status}


        🎯 Always include contact information.

        '
    - role: user
      message: user.name=Alice, user.status=active
    - role: assistant
      message: 'Name: Alice

        Bio: Senior software engineer with 10 years of experience building distributed
        systems. Passionate about clean architecture and mentoring junior developers.

        Status: active


        Contact: alice@example.com

        '
- name: modifiers
  title: Modifiers
  description: Elements that extend or constrain other syntax.
  examples:
  - name: modifiers-combined-template
    brief: Combined qualifiers and size indicators
    covers:
    - qualifier
    - size-indicator
    - placeholder
    - in-fill
    thread:
    - role: system
      message: 'Output after every response:

        ---

        In {country} they speak {}.

        Random fact: [...:1-2sentences| interesting trivia]

        Lucky numbers: [...:2-3items| integers 1-100]

        '
    - role: user
      message: Hello!
    - role: assistant
      message: 'Hey there!


        ---

        In Japan they speak Japanese.

        Random fact: Honey never spoils due to its low moisture content and acidic
        pH.

        Lucky numbers: 42, 17, 89

        '
- name: content-control
  title: Content Control
  description: Patterns for generation, omission, and literal output.
  examples:
  - name: content-control-combined
    brief: Literal strings, continuation, and omission
    covers:
    - literal-string
    - infer
    - omission
    thread:
    - role: system
      message: 'Document this NPL syntax:

        1. ⟬{user.name}⟭ shows placeholder syntax literally

        2. [___| example JSON payload omitted]

        3. Colors: red, blue, ...

        '
    - role: assistant
      message: '1. {user.name} shows placeholder syntax literally

        2. [___| example JSON payload omitted]

        3. Colors: red, blue, green, yellow, purple, orange

        '
- name: logic-and-flow
  title: Logic and Flow
  description: Conditional and iterative control structures.
  examples:
  - name: logic-combined-template
    brief: Conditionals with iteration and placeholders
    covers:
    - conditional-logic
    - placeholder
    - in-fill
    thread:
    - role: system
      message: 'Generate report:

        # {report.title}


        {{if report.summary}}

        ## Summary

        {report.summary}

        {{/if}}


        {{foreach report.items as item}}

        - {item.name}: {item.status}

        {{/foreach}}

        '
    - role: user
      message: 'report.title="Sprint Review", report.summary=null, report.items=[{name:
        "Feature A", status: "Done"}, {name: "Feature B", status: "In Progress"}]

        '
    - role: assistant
      message: '# Sprint Review


        - Feature A: Done

        - Feature B: In Progress

        '
- name: special-containers
  title: Special Containers
  description: Tagged sections with semantic meaning.
  examples:
  - name: containers-combined
    brief: Multiple section types together
    covers:
    - prompt-section
    thread:
    - role: system
      message: '<npl-syntax>

        COMMAND := <action> <target> [--flag]

        </npl-syntax>


        <npl-example>

        move file.txt --force

        copy src/ dest/

        </npl-example>


        <npl-note>

        Flags are optional but recommended for destructive operations.

        </npl-note>


        Generate a delete command.

        '
    - role: assistant
      message: delete temp.log --force
components:
- name: qualifier
  priority: 0
  friendly-name: Qualifier
  category: modifiers
  syntax:
  - name: pipe-qualifier
    syntax: '|<qualifier>'
    description: Appends qualifying instructions to placeholders or in-fill markers.
  brief: Extend elements with constraints or context
  description: Pipe syntax for adding instructions, constraints, or context to placeholders
    and in-fill.
  detection:
    patterns:
    - regex: \|[^\]\}⟫]+
      description: Pipe followed by qualifier text within a bracket context
    category: contextual
    notes: Qualifiers only appear within other markers (placeholders, in-fill). Detect
      parent first.
  labels:
  - inline
  - modifier
  - constraint
  require:
  - syntax.placeholder
  - syntax.in-fill
  - syntax.size-indicator
  examples:
  - name: basic-qualifier
    brief: Qualifier with placeholder and in-fill
    description: Demonstrates basic qualifier syntax combined with empty placeholder
      and sized in-fill.
    priority: 1
    purpose: Shows fundamental qualifier pipe syntax for content generation guidance
    covers:
    - placeholder
    - in-fill
    - size-indicator
    labels:
    - '{}'
    - '[...|<qualifier>]'
    - '[...:<range>|<qualifier>]'
    example: 'Hello {},

      Sea Fact:

      [...:1-2paragraph| provide a random sea fact in pirate speak]

      '
    title: Qualifier with placeholder and in-fill
  - name: qualified-in-fill-output
    brief: Qualified in-fill with thread output
    description: Shows qualifier guiding in-fill content generation with expected
      output demonstration.
    priority: 1
    purpose: Demonstrates qualifier effect on generated output via thread example
    labels:
    - '[...:<range>|<qualifier>]'
    - '[...|<qualifier>]'
    thread:
    - role: system
      message: 'Output: [...:5-7words| list of words related to the word blue]

        Poem: [...| based on words]

        '
    - role: assistant
      message: 'sad, turquoise, melancholy, sky, paint, navy

        Poem: Sad turquoise sky, painted navy blue like my thoughts of you.

        '
    title: Qualified in-fill with thread output
  - name: multi-element-qualification
    brief: Multiple qualified elements in template
    description: Combines multiple placeholder and in-fill qualifiers with various
      size indicators in a structured output template.
    priority: 2
    purpose: Demonstrates complex qualifier usage across different syntax elements
    labels:
    - '{term}'
    - '{}'
    - '{term|<qualifier>}'
    - '{term:<count>|<qualifier>}'
    - '[...:<count>|<qualifier>]'
    thread:
    - role: system
      message: 'Output after every response:

        ---

        In {country-random} they speak {}.

        pink: {association| first word that comes to mind when hearing pink}

        cats: {breed common name:2-4items| random cat breeds}

        lucky numbers: [...:2number| 2 random numbers 0-999]

        '
    - role: user
      message: hello!
    - role: assistant
      message: 'Hey, how can I help?

        ---

        In China they speak Mandarin.

        pink: tulips

        cats: Maine, Tuxedo, Ragdoll

        lucky numbers: 432 981

        '
    title: Multiple qualified elements in template
    covers:
    - qualifier
    - size-indicator
    - placeholder
    - in-fill
  - name: nested-qualifier
    brief: Qualifiers with multiple constraints
    description: Shows how to chain multiple constraints within a single qualifier.
    priority: 2
    purpose: Demonstrates advanced qualifier composition
    labels:
    - '[...|<qualifier>]'
    - '[...:<range>|<qualifier>]'
    - '{term|<qualifier>}'
    thread:
    - role: system
      message: 'Generate product description:

        Name: {product.name}

        Tagline: [...:1sentence| catchy, include benefit, under 10 words]

        Features: [...:3-5items| technical specs, bullet format]

        '
    - role: user
      message: product.name = "CloudSync Pro"
    - role: assistant
      message: 'Name: CloudSync Pro

        Tagline: Sync everything, everywhere, instantly.

        Features:

        • 256-bit AES encryption

        • Real-time synchronization across unlimited devices

        • 99.99% uptime SLA

        • API access with rate limiting

        '
    title: Qualifiers with multiple constraints
  title: Extend elements with constraints or context
- name: size-indicator
  priority: 0
  friendly-name: Size Indicator
  category: modifiers
  syntax:
  - name: fixed-count
    syntax: :<count><type>
    description: Exact count constraint (e.g., :3sentences, :5items).
  - name: range-count
    syntax: :<range><type>
    description: Range constraint allowing flexibility (e.g., :2-5paragraphs).
  - name: max-count
    syntax: :<{max}<type>
    description: Maximum limit constraint (e.g., :<100words).
  brief: 'Specify expected output size — Size qualifier for generated content. Combines
    with in-fill markers and qualifiers. Types: words, sentences, paragraphs, pages,
    lines, items, characters, or custom units. Use ranges (e.g., :2-5sentences) for
    flexibility or fixed counts (e.g., :3items).

    '
  description: Size qualifier for generated content.
  detection:
    patterns:
    - regex: :(\d+(-\d+)?|<\d+)(words?|sentences?|paragraphs?|pages?|lines?|items?|characters?|stanzas?|verses?)
      description: Size indicator with count and type
    category: contextual
    notes: Appears within in-fill markers or after placeholders. Detect parent context
      first.
  labels:
  - inline
  - modifier
  - constraint
  require:
  - syntax.in-fill
  - syntax.qualifier
  examples:
  - name: basic-size
    brief: Simple line count constraint
    description: Demonstrates basic size indicator syntax with fixed count.
    priority: 1
    purpose: Shows fundamental size constraint on in-fill
    labels:
    - '[...:<count><type>]'
    example: 'Write a haiku [...:3lines] about the ocean.

      '
    title: Simple line count constraint
  - name: range-size-output
    brief: Size range with thread output
    description: Shows size range indicator effect on generated content.
    priority: 1
    purpose: Demonstrates range-based sizing with example output
    labels:
    - '[...:<range><type>]'
    thread:
    - role: system
      message: 'Generate: [...:2-3sentences] about why the sky is blue.

        '
    - role: assistant
      message: 'The sky appears blue due to Rayleigh scattering. Shorter blue wavelengths
        scatter more than other colors when sunlight enters the atmosphere.

        '
    title: Size range with thread output
    covers:
    - size-indicator
    - in-fill
    - placeholder
  - name: multi-size-template
    brief: Multiple size indicators in template
    description: Combines multiple size indicators with different types in a structured
      output template.
    priority: 2
    purpose: Demonstrates various size types working together
    labels:
    - '[...:<count><type>]'
    - '[...:<range><type>]'
    - '{term}'
    thread:
    - role: system
      message: 'Recipe Card:

        Name: {recipe-name}

        Ingredients: [...:5-8items]

        Steps: [...:3-5paragraph]

        Tips: [...:1-2sentences]

        '
    - role: user
      message: chocolate chip cookies
    - role: assistant
      message: 'Name: Classic Chocolate Chip Cookies

        Ingredients: flour, butter, sugar, brown sugar, eggs, vanilla, baking soda,
        salt, chocolate chips

        Steps:

        Preheat oven to 375°F. Cream butter and sugars until fluffy.


        Beat in eggs and vanilla. Mix flour, baking soda, and salt separately, then
        combine with wet ingredients.


        Fold in chocolate chips. Drop spoonfuls onto baking sheet. Bake 9-11 minutes
        until golden.

        Tips: Chill dough for 30 minutes for thicker cookies. Use room temperature
        butter.

        '
    title: Multiple size indicators in template
    covers:
    - size-indicator
    - qualifier
  - name: size-with-qualifier
    brief: Size combined with content qualifier
    description: Shows size indicator working alongside content qualifiers for precise
      control.
    priority: 2
    purpose: Demonstrates size and qualifier interaction
    labels:
    - '[...:<range><type>|<qualifier>]'
    thread:
    - role: system
      message: 'Executive Summary: [...:100-150words| formal tone, no jargon]

        Key Metrics: [...:3-5items| quantitative only]

        Next Steps: [...:2-3sentences| action-oriented]

        '
    - role: user
      message: Q3 performance review for engineering team
    - role: assistant
      message: 'Executive Summary: The engineering team delivered strong results in
        Q3, completing 94% of planned initiatives while maintaining code quality standards.
        Team velocity increased by 18% compared to Q2, attributed to improved sprint
        planning and reduced context switching. Infrastructure reliability reached
        99.97% uptime, exceeding the 99.9% target.


        Key Metrics:

        • Sprint velocity: 847 points (+18% QoQ)

        • Bug escape rate: 2.1% (-0.8% QoQ)

        • Deploy frequency: 12.3 per week (+24% QoQ)


        Next Steps: Prioritize technical debt reduction in Q4 sprint planning. Implement
        automated performance regression testing before November release.

        '
    title: Size combined with content qualifier
  title: Specify expected output size
- name: highlight
  priority: 0
  friendly-name: Highlight
  category: core-elements
  syntax:
  - name: backtick-highlight
    syntax: '`<term>`'
    description: Standard backtick emphasis for key terms and concepts.
  brief: 'Emphasize key concepts — Term emphasis using backticks to highlight important
    terms, phrases, or concepts requiring attention.

    '
  description: Term emphasis using backticks.
  detection:
    patterns:
    - regex: '`[^`]+`'
      description: Single backtick highlight
    - regex: '``[^`]+``'
      description: Double backtick highlight (escaped)
    category: contextual
    false_positives:
    - Markdown code blocks
    - Inline code in technical docs
    notes: Context determines if highlighting or code. NPL uses for emphasis.
  labels:
  - inline
  - emphasis
  require:
  - syntax.placeholder
  examples:
  - name: basic-highlight
    brief: Single term emphasis
    description: Demonstrates basic backtick emphasis for a key term.
    priority: 1
    purpose: Shows fundamental highlight syntax
    labels:
    - '`term`'
    example: 'Explain what a `callback` function does in JavaScript.

      '
    title: Single term emphasis
  - name: highlight-definition
    brief: Highlight with definition output
    description: Shows highlighted term triggering focused definition.
    priority: 1
    purpose: Demonstrates highlight effect on generated explanation
    labels:
    - '`term`'
    thread:
    - role: system
      message: 'Define: `polymorphism`

        '
    - role: assistant
      message: 'Polymorphism is the ability of objects to take multiple forms, allowing
        the same interface to represent different underlying data types.

        '
    title: Highlight with definition output
  - name: multi-highlight-compare
    brief: Multiple highlights for comparison
    description: Uses multiple highlighted terms for comparative explanation.
    priority: 2
    purpose: Demonstrates multiple highlights in comparison context
    labels:
    - '`term`'
    - '`term` vs `term`'
    thread:
    - role: system
      message: 'Compare `mutex` vs `semaphore` vs `spinlock` for thread synchronization.

        '
    - role: assistant
      message: 'A `mutex` provides exclusive access to one thread at a time.

        A `semaphore` allows a specified number of concurrent accesses.

        A `spinlock` busy-waits instead of sleeping, useful for short critical sections.

        '
    title: Multiple highlights for comparison
  - name: highlight-in-context
    brief: Highlights within prose
    description: Shows highlights used naturally within explanatory text.
    priority: 1
    purpose: Demonstrates inline highlighting for technical terms
    labels:
    - '`term`'
    thread:
    - role: system
      message: 'Explain how `async` and `await` work together in Python, including
        the role of the `event loop`.

        '
    - role: assistant
      message: 'In Python, `async` declares a coroutine function that can be paused
        and resumed. When you call an `async` function, it returns a coroutine object
        rather than executing immediately.


        The `await` keyword pauses the coroutine until the awaited operation completes,
        allowing the `event loop` to run other tasks. The `event loop` is the central
        coordinator that manages all coroutines, deciding which one runs when another
        is waiting.

        '
    title: Highlights within prose
  title: Emphasize key concepts
- name: attention
  priority: 0
  friendly-name: Attention
  category: core-elements
  syntax:
  - name: target-attention
    syntax: 🎯 <instruction>
    description: Critical instruction marker for high-priority directives.
  brief: 'Mark critical instructions — Critical instruction marker using 🎯 emoji prefix
    for high-priority directives. Non-negotiable requirements that must take precedence.
    Use sparingly.

    '
  description: Critical instruction marker using 🎯 emoji.
  detection:
    patterns:
    - regex: 🎯\s*.+
      description: Target emoji followed by instruction
    category: pure
    notes: Unambiguous pattern - 🎯 emoji at line start signals attention.
  labels:
  - inline
  - emphasis
  - critical
  require:
  - syntax.qualifier
  examples:
  - name: basic-attention
    brief: Single critical instruction
    description: Demonstrates basic attention marker for high-priority directive.
    priority: 1
    purpose: Shows fundamental attention syntax
    labels:
    - 🎯 <instruction>
    example: '🎯 Always escape user input before database queries.

      '
    title: Single critical instruction
  - name: attention-with-output
    brief: Attention directive with implementation
    description: Shows attention marker guiding generated output.
    priority: 1
    purpose: Demonstrates attention effect on code generation
    labels:
    - 🎯 <instruction>
    thread:
    - role: system
      message: 'Generate login form HTML.

        🎯 Include CSRF token field.

        '
    - role: assistant
      message: "<form method=\"POST\" action=\"/login\">\n  <input type=\"hidden\"\
        \ name=\"csrf_token\" value=\"{{csrf}}\">\n  <input type=\"text\" name=\"\
        username\">\n  <input type=\"password\" name=\"password\">\n  <button type=\"\
        submit\">Login</button>\n</form>\n"
    title: Attention directive with implementation
  - name: multi-attention
    brief: Multiple attention markers
    description: Uses multiple attention markers to enforce several critical requirements.
    priority: 2
    purpose: Demonstrates multiple attention directives working together
    labels:
    - 🎯 <instruction>
    thread:
    - role: system
      message: 'Write a file upload handler.

        🎯 Validate file type before processing.

        🎯 Limit file size to 5MB.

        🎯 Sanitize filename.

        '
    - role: user
      message: Python Flask
    - role: assistant
      message: "ALLOWED = {'png', 'jpg', 'pdf'}\nMAX_SIZE = 5 * 1024 * 1024\n\n@app.route('/upload',\
        \ methods=['POST'])\ndef upload():\n    file = request.files['file']\n   \
        \ if file.content_length > MAX_SIZE:\n        return 'File too large', 413\n\
        \    ext = file.filename.rsplit('.', 1)[1].lower()\n    if ext not in ALLOWED:\n\
        \        return 'Invalid type', 400\n    filename = secure_filename(file.filename)\n\
        \    file.save(os.path.join(UPLOAD_DIR, filename))\n"
    title: Multiple attention markers
  title: Mark critical instructions
- name: placeholder
  priority: 0
  friendly-name: Placeholder
  category: core-elements
  syntax:
  - name: brace-placeholder
    syntax: '{term}'
    description: Standard placeholder for variable substitution. Most common form.
  - name: brace-empty
    syntax: '{}'
    description: Empty placeholder for contextually inferred values.
  - name: bracket-placeholder
    syntax: <term>
    description: Angle bracket placeholder for syntax definitions and formal specs.
  - name: double-bracket
    syntax: ⟪term⟫
    description: Unicode bracket placeholder when other brackets conflict with content.
  - name: qualified-placeholder
    syntax: '{term|<qualifier>}'
    description: Placeholder with generation guidance.
  - name: constrained-placeholder
    syntax: '{term:<constraint>}'
    description: Placeholder with value constraints.
  brief: 'Indicate expected content locations — Mark where specific content should
    be inserted by users or generated by agents. Supports dot notation for property
    access and can be combined with qualifiers for guided substitution.

    '
  description: Mark locations for content insertion or generation.
  detection:
    patterns:
    - regex: \{[a-z][a-z0-9_\-]*(\.[a-z][a-z0-9_\-]*)*\}
      description: Brace placeholder with optional dot notation
    - regex: \{[a-z][a-z0-9_\-]*[|:][^\}]+\}
      description: Qualified or constrained placeholder
    - regex: \{\}
      description: Empty placeholder
    - regex: <[a-z][a-z0-9_\-]*>
      description: Angle bracket placeholder
    - regex: ⟪[^:⟫]+⟫
      description: Unicode placeholder (no colon - not a directive)
    category: contextual
    false_positives:
    - JSON object braces {}
    - Template literals ${...}
    - HTML tags <div>, <span>, <a>
    - XML elements
    - Handlebars {{...}}
    validation_hints:
    - NPL placeholders use lowercase kebab-case
    - 'Dot notation indicates property access: {user.name}'
    - <term> placeholders are single words without attributes
  labels:
  - inline
  - variable
  require:
  - syntax.qualifier
  examples:
  - name: basic-placeholder
    brief: Brace and dot notation
    description: Demonstrates basic placeholder syntax with property access.
    priority: 1
    purpose: Shows fundamental placeholder patterns
    labels:
    - '{term}'
    - '{term.property}'
    example: 'Dear {recipient.name},

      Thank you for your order #{order.id}.

      '
    title: Brace and dot notation
  - name: placeholder-substitution
    brief: Placeholder with thread output
    description: Shows placeholder resolution with both brace and bracket styles.
    priority: 1
    purpose: Demonstrates placeholder substitution in action
    labels:
    - '{term}'
    - <term>
    thread:
    - role: system
      message: 'Template: "Welcome to <city>, {user.name}!"

        '
    - role: user
      message: city=Tokyo, user.name=Alice
    - role: assistant
      message: 'Welcome to Tokyo, Alice!

        '
    title: Placeholder with thread output
  - name: multi-style-placeholder
    brief: All placeholder styles
    description: Uses all three placeholder styles plus empty placeholder in a structured
      template.
    priority: 2
    purpose: Demonstrates different placeholder formats working together
    labels:
    - '{term}'
    - <term>
    - ⟪term⟫
    - '{}'
    thread:
    - role: system
      message: "API Response Template:\n{\n  \"status\": <status_code>,\n  \"user\"\
        : \"{user.email}\",\n  \"data\": ⟪response_payload⟫,\n  \"empty_allowed\"\
        : {}\n}\n"
    - role: user
      message: '200, alice@test.com, {"items": [1,2,3]}

        '
    - role: assistant
      message: "{\n  \"status\": 200,\n  \"user\": \"alice@test.com\",\n  \"data\"\
        : {\"items\": [1,2,3]},\n  \"empty_allowed\": null\n}\n"
    title: All placeholder styles
  - name: placeholder-with-qualifier
    brief: Qualified placeholders
    description: Shows placeholders combined with qualifiers for guided substitution.
    priority: 2
    purpose: Demonstrates placeholder and qualifier interaction
    labels:
    - '{term|<qualifier>}'
    - '{term:<constraint>}'
    thread:
    - role: system
      message: 'Generate test data:

        Username: {username| 8-12 alphanumeric characters}

        Email: {email| valid format, use example.com domain}

        Age: {age:18-65| integer within range}

        '
    - role: assistant
      message: 'Username: testUser42

        Email: user.test@example.com

        Age: 34

        '
    title: Qualified placeholders
  title: Indicate expected content locations
- name: in-fill
  priority: 0
  friendly-name: In Fill
  category: core-elements
  syntax:
  - name: basic-in-fill
    syntax: '[...]'
    description: Basic content generation marker.
  - name: sized-in-fill
    syntax: '[...:<size>]'
    description: In-fill with size constraint.
  - name: qualified-in-fill
    syntax: '[...|<qualifier>]'
    description: In-fill with generation guidance.
  - name: full-in-fill
    syntax: '[...:<size>|<qualifier>]'
    description: In-fill with both size and qualifier.
  brief: 'Mark content generation areas — Content generation markers where agents
    create contextual content (unlike placeholders that substitute known values).
    Enhancements: size indicators [...:2-3sentences], qualifiers [...| formal tone],
    or both [...:100words| technical].

    '
  description: Markers for contextual content generation.
  detection:
    patterns:
    - regex: \[\.\.\.[^\]]*\]
      description: In-fill marker with optional size/qualifier
    category: contextual
    false_positives:
    - Literal [...] in documentation
    - Array spread syntax in code
    validation_hints:
    - In-fill always starts with three dots
    - 'May contain : for size or | for qualifier'
  labels:
  - inline
  - generation
  require:
  - syntax.qualifier
  - syntax.size-indicator
  examples:
  - name: basic-in-fill
    brief: Simple content generation
    description: Demonstrates basic in-fill marker for content generation.
    priority: 1
    purpose: Shows fundamental in-fill syntax
    labels:
    - '[...]'
    example: 'The main benefits of exercise include [...].

      '
    title: Simple content generation
  - name: sequential-in-fill
    brief: Multiple in-fills with output
    description: Shows multiple in-fill markers resolved in sequence.
    priority: 1
    purpose: Demonstrates sequential in-fill generation
    labels:
    - '[...]'
    thread:
    - role: system
      message: 'Complete: "To make coffee, first [...], then [...], finally [...]."

        '
    - role: assistant
      message: 'To make coffee, first grind fresh beans, then brew with hot water
        just off boil, finally serve immediately.

        '
    title: Multiple in-fills with output
    covers:
    - in-fill
    - qualifier
    - size-indicator
  - name: in-fill-template
    brief: In-fill with qualifiers and sizes
    description: Combines in-fill with qualifiers and size indicators in a structured
      template.
    priority: 2
    purpose: Demonstrates in-fill variations working together
    labels:
    - '[...]'
    - '[...:<range>]'
    - '[...|<qualifier>]'
    - '{term}'
    thread:
    - role: system
      message: 'Book Review:

        Title: {book.title}

        Summary: [...:2-3sentences]

        Pros: [...| list 3 strengths]

        Cons: [...| list 2 weaknesses]

        Verdict: [...]

        '

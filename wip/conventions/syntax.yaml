  title: Mark content generation areas
- name: infer
  priority: 0
  friendly-name: Infer
  category: content-control
  syntax:
  - name: trailing-ellipsis
    syntax: '...'
    description: Trailing ellipsis indicating pattern continuation.
  - name: etc-marker
    syntax: ', etc.'
    description: Explicit continuation marker for lists.
  - name: and-so-on
    syntax: ', and so on'
    description: Natural language continuation marker.
  - name: qualified-infer
    syntax: (...| <qualifier>)
    description: Inference with qualifier guidance. Parentheses visually delimit the
      qualifier.
  brief: 'Signal pattern continuation — Continuation patterns for extending established
    sequences (unlike in-fill that generates contextual content). Variants: `...`
    trailing ellipsis, `, etc.` explicit, `(...| <qualifier>)` guided.

    '
  description: Patterns for extending established sequences.
  detection:
    patterns:
    - regex: ',\s*\.\.\.'
      description: Trailing ellipsis after comma
    - regex: ',\s*etc\.?'
      description: Etc. continuation marker
    - regex: ',\s*and so on'
      description: Natural language continuation
    - regex: \(\.\.\.\|[^\)]+\)
      description: Qualified inference in parentheses
    - regex: \(etc\.\|[^\)]+\)
      description: Qualified etc. in parentheses
    category: contextual
    false_positives:
    - Ellipsis in prose for pause
    - etc. in normal text
    notes: Context of list or sequence needed to confirm NPL usage.
  labels:
  - inline
  - generation
  - guidance
  require:
  - syntax.qualifier
  examples:
  - name: basic-infer
    brief: Simple list continuation
    description: Demonstrates basic ellipsis for list continuation.
    priority: 1
    purpose: Shows fundamental inference syntax
    labels:
    - '...'
    example: 'Primary colors: red, blue, ...

      '
    title: Simple list continuation
  - name: infer-completion
    brief: Pattern continuation with output
    description: Shows inference continuation with generated completion.
    priority: 1
    purpose: Demonstrates infer triggering list completion
    labels:
    - '...'
    - ', etc.'
    thread:
    - role: system
      message: 'List planets: Mercury, Venus, Earth, ...

        '
    - role: assistant
      message: 'Mercury, Venus, Earth, Mars, Jupiter, Saturn, Uranus, Neptune

        '
    title: Pattern continuation with output
    covers:
    - infer
  - name: multi-pattern-infer
    brief: Multiple pattern completions
    description: Demonstrates various pattern types with infer syntax.
    priority: 2
    purpose: Shows both ellipsis and etc. patterns with completions
    labels:
    - '...'
    - ', etc.'
    thread:
    - role: system
      message: 'Complete patterns:

        - Fibonacci: 1, 1, 2, 3, 5, ...

        - Powers of 2: 1, 2, 4, 8, ...

        - Vowels: a, e, i, ...

        - HTTP methods: GET, POST, PUT, etc.

        '
    - role: assistant
      message: '- Fibonacci: 1, 1, 2, 3, 5, 8, 13, 21, 34

        - Powers of 2: 1, 2, 4, 8, 16, 32, 64, 128

        - Vowels: a, e, i, o, u

        - HTTP methods: GET, POST, PUT, DELETE, PATCH, HEAD, OPTIONS

        '
    title: Multiple pattern completions
  - name: infer-vs-in-fill
    brief: Inference versus generation
    description: Contrasts pattern inference with content generation.
    priority: 2
    purpose: Clarifies the distinction between infer and in-fill
    labels:
    - '...'
    - '[...]'
    thread:
    - role: system
      message: '# Inference (pattern completion):

        Days: Monday, Tuesday, Wednesday, ...


        # Generation (contextual creation):

        Things to do on Monday: [...]

        '
    - role: assistant
      message: 'Days: Monday, Tuesday, Wednesday, Thursday, Friday, Saturday, Sunday


        Things to do on Monday: Start the week with a team standup, review priorities,
        and tackle the most challenging task while energy is high.

        '
    title: Inference versus generation
  - name: qualified-infer
    brief: Inference with qualifier guidance
    description: Shows inference patterns with qualifiers using parentheses for visual
      delimiting.
    priority: 2
    purpose: Demonstrates qualified inference for guided pattern completion
    labels:
    - (...| <qualifier>)
    - (etc.| <qualifier>)
    thread:
    - role: system
      message: 'List programming languages by paradigm:


        Functional: Haskell, Erlang, (etc.| 3 more, include one modern language)

        Object-Oriented: Java, C++, (...| focus on dynamically typed)

        Systems: C, Rust, (...| low-level, memory-safe options)

        '
    - role: assistant
      message: 'Functional: Haskell, Erlang, Clojure, F#, Elixir

        Object-Oriented: Java, C++, Python, Ruby, JavaScript

        Systems: C, Rust, Zig, Ada

        '
    title: Inference with qualifier guidance
  title: Signal pattern continuation
- name: literal-string
  priority: 0
  friendly-name: Literal String
  category: content-control
  syntax:
  - name: literal-escape
    syntax: ⟬<text>⟭
    description: White tortoise shell bracket delimiters (U+27EC, U+27ED) for literal
      text. Rare enough to avoid escape logic entirely.
  brief: 'Exact text reproduction — Ensures text is output exactly as provided. The
    `⟬...⟭` wrapper is consumed during processing—only raw content appears. Use for
    text containing NPL syntax, preventing interpretation, or documenting NPL itself.

    '
  description: Ensures text is output exactly as provided.
  detection:
    patterns:
    - regex: ⟬[^⟭]*⟭
      description: White tortoise shell brackets for literal text
    category: pure
    notes: Unicode brackets U+27EC/U+27ED are unambiguous NPL markers.
  labels:
  - inline
  - escape
  examples:
  - name: basic-literal
    brief: Exact text output
    description: Demonstrates basic literal string for exact reproduction.
    priority: 1
    purpose: Shows fundamental literal syntax
    labels:
    - ⟬<text>⟭
    example: 'Output exactly: ⟬Hello, World!⟭

      '
    title: Exact text output
  - name: literal-with-output
    brief: Literal string with thread output
    description: Shows literal string being reproduced exactly in output.
    priority: 1
    purpose: Demonstrates literal effect on generated output
    labels:
    - ⟬<text>⟭
    thread:
    - role: system
      message: 'Print: ⟬SELECT * FROM users WHERE id = ?⟭

        '
    - role: assistant
      message: 'SELECT * FROM users WHERE id = ?

        '
    title: Literal string with thread output
  - name: literal-special-chars
    brief: Preserving special characters
    description: Uses literal syntax to preserve NPL markers and special characters.
    priority: 2
    purpose: Demonstrates escaping various special character types
    labels:
    - ⟬<text>⟭
    thread:
    - role: system
      message: 'Output these exactly:

        1. ⟬{user.name}⟭ (show placeholder syntax)

        2. ⟬[...] <term>⟭ (show NPL markers)

        3. ⟬C:\Users\name\file.txt⟭ (preserve backslashes)

        '
    - role: assistant
      message: '1. {user.name} (show placeholder syntax)

        2. [...] <term> (show NPL markers)

        3. C:\Users\name\file.txt (preserve backslashes)

        '
    title: Preserving special characters
  - name: literal-npl-documentation
    brief: Documenting NPL syntax
    description: Shows literal strings used to document NPL syntax elements.
    priority: 2
    purpose: Demonstrates escaping NPL syntax for documentation
    labels:
    - ⟬<text>⟭
    - '[...|<qualifier>]'
    thread:
    - role: system
      message: 'Document these NPL patterns for a tutorial using markdown formatting
        with the below format.

        **Placeholders** ⟬`{user.name}`⟭: [...|description]

        **In-fill** ⟬`[...]`⟭: [...|description]

        '
    - role: assistant
      message: '**Placeholders** `{user.name}`: Marks substitution points for variable
        content. Dot notation accesses nested properties.

        **In-fill** `[...]`: Indicates where the model should generate contextual
        content rather than substitute known values.

        '
    title: Documenting NPL syntax
  - name: literal-raw-output
    brief: Output arbitrary text without escape markers
    description: Shows literal escape producing clean output without the wrapper syntax.
    priority: 1
    purpose: Demonstrates that literal content outputs raw text only
    labels:
    - ⟬<text>⟭
    thread:
    - role: system
      message: 'Output this exactly: ⟬<< HEY HEY HEY [ guy ] >>⟭

        '
    - role: assistant
      message: '<< HEY HEY HEY [ guy ] >>

        '
    title: Output arbitrary text without escape markers
  title: Exact text reproduction
- name: omission
  priority: 0
  friendly-name: Omission
  category: content-control
  syntax:
  - name: basic-omission
    syntax: '[___]'
    description: Basic omission marker indicating content left out.
  - name: described-omission
    syntax: '[___| <qualifier>]'
    description: Omission with qualifier describing what was omitted.
  brief: 'Content omitted for brevity — Meta-annotation indicating content intentionally
    left out but would be present in actual input/output. Used for truncating examples,
    indicating user content location, or showing structure without full content.

    '
  description: Meta-annotation for omitted content.
  detection:
    patterns:
    - regex: \[_{3,}[^\]]*\]
      description: Triple+ underscore in brackets, optional qualifier
    category: pure
    notes: Unambiguous pattern - three or more underscores in brackets.
  labels:
  - inline
  - meta
  - documentation
  require:
  - syntax.qualifier
  examples:
  - name: basic-omission
    brief: Simple content omission
    description: Demonstrates basic omission marker with description.
    priority: 1
    purpose: Shows fundamental omission syntax
    labels:
    - '[___]'
    - '[___| <qualifier>]'
    example: 'Parse this JSON and extract names:

      [___| large JSON array omitted]

      '
    title: Simple content omission
  - name: omission-with-context
    brief: Omission with thread output
    description: Shows omission marker in context with response handling.
    priority: 1
    purpose: Demonstrates how omissions are processed
    labels:
    - '[___]'
    - '[___| <qualifier>]'
    thread:
    - role: system
      message: 'Summarize this error log:

        [___| 500 lines of stack trace omitted for brevity]

        Final error: NullPointerException at line 42

        '
    - role: assistant
      message: 'The application crashed with a NullPointerException at line 42. Review
        null checks in that code path.

        '
    title: Omission with thread output
  - name: multi-omission
    brief: Multiple omissions in structure
    description: Uses multiple omission markers to indicate abbreviated content in
      a structured document.
    priority: 2
    purpose: Demonstrates multiple omissions in context
    labels:
    - '[___]'
    - '[___| <qualifier>]'
    thread:
    - role: system
      message: "Review this API response structure:\n{\n  \"meta\": [___| pagination\
        \ info],\n  \"data\": [___| array of 100 user objects],\n  \"errors\": []\n\
        }\nWhat's the response pattern?\n"
    - role: assistant
      message: 'Standard paginated API response with three fields:

        - `meta`: Contains pagination (page, limit, total)

        - `data`: Array of resource objects

        - `errors`: Empty array on success, error details on failure

        '
    title: Multiple omissions in structure
  - name: omission-vs-in-fill
    brief: Omission versus in-fill distinction
    description: Clarifies when to use omission markers versus in-fill markers.
    priority: 1
    purpose: Distinguishes meta-annotation from generation instruction
    labels:
    - '[___]'
    - '[...]'
    thread:
    - role: system
      message: '# Omission (content exists but not shown):

        User uploaded: [___| 50-page PDF document]


        # In-fill (content to be generated):

        Summary: [...]

        '
    - role: user
      message: The PDF is about climate change impacts on agriculture.
    - role: assistant
      message: 'Summary: The document examines how rising temperatures, changing precipitation
        patterns, and extreme weather events affect crop yields and farming practices
        worldwide.

        '
    title: Omission versus in-fill distinction
  title: Content omitted for brevity
- name: conditional-logic
  priority: 0
  friendly-name: Conditional Logic
  category: logic-and-flow
  syntax:
  - name: if-block
    syntax: '{{if <condition>}}[___]{{/if}}'
    description: Conditional block that renders content when condition is true.
  - name: if-else-block
    syntax: '{{if <condition>}}[___]{{else}}[___]{{/if}}'
    description: Conditional with alternative content when condition is false.
  - name: foreach-block
    syntax: '{{foreach <collection> as <item>}}[___]{{/foreach}}'
    description: Iteration block that repeats content for each item in collection.
  - name: unless-block
    syntax: '{{unless <condition>}}[___]{{/unless}}'
    description: Inverse conditional that renders when condition is false.
  brief: 'Control flow for dynamic content — Handlebars-style constructs for conditional
    rendering, iteration, and dynamic generation. Includes {{if}}, {{else}}, {{foreach}},
    {{unless}} with context variables (@first, @last, @index).

    '
  description: Handlebars-style control structures.
  detection:
    patterns:
    - regex: \{\{if\s+[^\}]+\}\}
      description: If conditional opening
    - regex: \{\{/if\}\}
      description: If conditional closing
    - regex: \{\{else\}\}
      description: Else branch
    - regex: \{\{foreach\s+[^\}]+\}\}
      description: Foreach loop opening
    - regex: \{\{/foreach\}\}
      description: Foreach loop closing
    - regex: \{\{unless\s+[^\}]+\}\}
      description: Unless conditional opening
    - regex: \{\{/unless\}\}
      description: Unless conditional closing
    category: contextual
    false_positives:
    - Handlebars templates
    - Mustache templates
    notes: Handlebars-style syntax. Context determines NPL vs template engine.
  labels:
  - block
  - logic
  require:
  - syntax.placeholder
  - syntax.in-fill
  - syntax.infer
  examples:
  - name: basic-conditional
    brief: Simple if block
    description: Demonstrates basic conditional rendering.
    priority: 1
    purpose: Shows fundamental conditional syntax
    labels:
    - '{{if}}'
    - '{{/if}}'
    example: '{{if user.premium}}

      Welcome back, premium member!

      {{/if}}

      '
    title: Simple if block
  - name: conditional-with-else
    brief: If-else conditional
    description: Shows conditional with alternative content.
    priority: 1
    purpose: Demonstrates if-else branching
    labels:
    - '{{if}}'
    - '{{else}}'
    - '{{/if}}'
    thread:
    - role: system
      message: 'Generate greeting:

        {{if user.name}}

        Hello, {user.name}!

        {{else}}

        Hello, guest!

        {{/if}}

        '
    - role: user
      message: user.name=null
    - role: assistant
      message: 'Hello, guest!

        '
    title: If-else conditional
  - name: foreach-iteration
    brief: Collection iteration
    description: Shows iteration over a collection.
    priority: 1
    purpose: Demonstrates foreach loop
    labels:
    - '{{foreach}}'
    - '{{/foreach}}'
    thread:
    - role: system
      message: 'Shopping cart:

        {{foreach items as item}}

        - {item.name}: ${item.price}

        {{/foreach}}

        '
    - role: user
      message: 'items=[{name: "Book", price: 15}, {name: "Pen", price: 2}]

        '
    - role: assistant
      message: 'Shopping cart:

        - Book: $15

        - Pen: $2

        '
    title: Collection iteration
  - name: nested-conditionals
    brief: Complex nested logic
    description: Combines conditionals with iteration and context variables.
    priority: 2
    purpose: Demonstrates advanced control flow patterns
    labels:
    - '{{foreach}}'
    - '{{if}}'
    - '@first'
    - '@last'
    thread:
    - role: system
      message: 'Format author list:

        {{foreach authors as author}}

        {{if @first}}Authors: {{/if}}{author.name}{{if not @last}}, {{else}}.{{/if}}

        {{/foreach}}

        '
    - role: user
      message: 'authors=[{name: "Alice"}, {name: "Bob"}, {name: "Carol"}]

        '
    - role: assistant
      message: 'Authors: Alice, Bob, Carol.

        '
    title: Complex nested logic
    covers:
    - conditional-logic
    - placeholder
    - in-fill
  - name: conditional-output-format
    brief: Dynamic output structure
    description: Uses conditionals to vary output format based on data.
    priority: 2
    purpose: Demonstrates conditionals controlling output behavior
    labels:
    - '{{if}}'
    - '{{foreach}}'
    - '{{unless}}'
    thread:
    - role: system
      message: 'Generate report:

        # {report.title}


        {{if report.summary}}

        ## Summary

        {report.summary}

        {{/if}}


        {{unless report.items}}

        No items to display.

        {{/unless}}


        {{if report.items}}

        ## Items

        {{foreach report.items as item}}

        - {item.name}: {item.status}

        {{/foreach}}

        {{/if}}

        '
    - role: user
      message: 'report={title: "Status", summary: null, items: [{name: "Task 1", status:
        "Done"}]}

        '
    - role: assistant
      message: '# Status


        ## Items

        - Task 1: Done

        '
    title: Dynamic output structure
  title: Control flow for dynamic content
- name: prompt-section
  priority: 0
  friendly-name: Prompt Section
  category: special-containers
  syntax:
  - name: section-tag-multiline
    syntax: <npl-{type}>\n[___]\n</npl-{type}>
    description: XML-style block with semantic type indicator.
  - name: fence-section-content
    syntax: '```npl-{type}\n[___]\n```'
    description: Fenced code block start.

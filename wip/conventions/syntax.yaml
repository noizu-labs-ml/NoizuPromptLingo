      message: 1984 by George Orwell
    - role: assistant
      message: 'Title: 1984

        Summary: A dystopian novel set in a totalitarian society under constant surveillance.
        Winston Smith struggles against the Party''s oppressive control of truth and
        memory.

        Pros: Prophetic themes still relevant today, masterful world-building, psychologically
        gripping

        Cons: Bleak tone may deter some readers, slow pacing in middle sections

        Verdict: Essential reading that remains hauntingly prescient.

        '
    title: In-fill with qualifiers and sizes
  - name: in-fill-vs-placeholder
    brief: Distinguishing in-fill from placeholder
    description: Shows the difference between in-fill (generated) and placeholder
      (substituted) content.
    priority: 1
    purpose: Clarifies when to use each syntax element
    labels:
    - '[...]'
    - '{term}'
    thread:
    - role: system
      message: '# Substituted (known values):

        Customer: {customer.name}

        Order ID: {order.id}


        # Generated (contextual):

        Greeting: [...]

        Personalized recommendation: [...| based on order history]

        '
    - role: user
      message: customer.name=Sarah, order.id=12345, order history shows frequent book

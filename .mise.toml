# mise configuration for NoizuPromptLingo

[tools]

[tasks]
# Run the MCP server
run = "uv run npl-mcp"

# Run tests
test = "uv run pytest tests/ -v"

# Run tests with coverage
test-coverage = "uv run pytest tests/ --cov=src/npl_mcp --cov-report=term-missing --cov-report=html"

# Run tests with HTML coverage report
test-html = "uv run pytest tests/ --cov=src/npl_mcp --cov-report=html && echo 'Coverage report: htmlcov/index.html'"

# Run server in background
start-server = "uv run npl-mcp &"

# Stop the server (if running with pid file)
stop-server = "[ -f data/.npl-mcp.pid ] && kill $(cat data/.npl-mcp.pid) 2>/dev/null || echo 'No PID file found'"

# Check server status
status = "npl-mcp --status"

# Test status - emoji only (pass/fail)
test-status = "uv run pytest tests/ -q 2>/dev/null >/dev/null && echo '✅' || echo '❌'"

# Test errors - show failing tests with minimal output
test-errors = "uv run pytest --tb=no -q tests/"

# Run FastMCP Inspector for development/debugging
inspect = "uv run fastmcp dev src/npl_mcp/launcher.py:create_app --with-editable ."
# Usage Notes
usage_notes: |
  These are general FastMCP framework documentation files copied from
  worktrees/main/docs/fastmcp/. They provide comprehensive guides for
  building FastMCP-based MCP servers.

  These are NOT project-specific implementation guides. Rather, they are
  framework reference documentation for understanding how FastMCP works.

  For project-specific MCP tool implementations, see:
  - docs/PRDs/prd-009-mcp-tools-implementation.md
  - docs/pending/features-grid.md (MCP tools section)


    implementation_method: 'SessionManager.update_session'
    implementation_line: 132
    database_tables:
      - sessions
    web_routes: []
    user_stories: []
    test_coverage_percent: 0
    example: |
      # Update session title
      result = await update_session(
          session_id="a7f3k9m2",
          title="Q4 Planning - Final Review"
      )

      # Archive a session
      result = await update_session(
          session_id="a7f3k9m2",
          status="archived"
      )

      # Update both title and status
      result = await update_session(
          session_id="a7f3k9m2",
          title="Q4 Planning - Completed",
          status="archived"
      )

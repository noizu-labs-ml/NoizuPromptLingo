  - name: update_session
    signature: 'update_session(session_id: str, title: Optional[str] = None, status: Optional[str] = None) -> dict'
    description: Update session metadata (title and/or status) with automatic timestamp tracking
    implementation_file: 'worktrees/main/mcp-server/src/npl_mcp/sessions/manager.py'
    mcp_definition_file: 'worktrees/main/mcp-server/src/npl_mcp/unified.py'

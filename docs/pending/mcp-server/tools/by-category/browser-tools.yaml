tools:
  # Screenshot Tools (3 tools)
  - name: screenshot_capture
    signature: 'screenshot_capture(url: str, name: str, viewport: str = "desktop", theme: str = "light", full_page: bool = True, wait_for: Optional[str] = None, wait_timeout: int = 5000, network_idle: bool = True, session_id: Optional[str] = None, created_by: Optional[str] = None) -> dict'
    description: Capture screenshot of a web page and store as artifact with viewport/theme control
    implementation_file: 'worktrees/main/mcp-server/src/npl_mcp/browser/capture.py'
    database_tables: [artifacts, revisions]
    web_routes: [GET /artifact/{id}, GET /api/artifact/{id}]
    user_stories: [US-052, US-048]
    test_coverage_percent: null
    example: |
      result = await screenshot_capture(
          url="https://example.com",
          name="homepage-dark",
          viewport="desktop",
          theme="dark",
          full_page=True
      )

  - name: screenshot_diff
    signature: 'screenshot_diff(baseline_artifact_id: int, comparison_artifact_id: int, threshold: float = 0.1, session_id: Optional[str] = None, created_by: Optional[str] = None) -> dict'
    description: Generate visual diff between two screenshot artifacts using pixelmatch algorithm
    implementation_file: 'worktrees/main/mcp-server/src/npl_mcp/browser/diff.py'
    database_tables: [artifacts, revisions]
    web_routes: [GET /artifact/{id}]
    user_stories: [US-042]
    test_coverage_percent: null
    example: |
      diff = await screenshot_diff(
          baseline_artifact_id=1,
          comparison_artifact_id=2,
          threshold=0.1
      )

  - name: browser_screenshot
    signature: 'browser_screenshot(name: str, session_id: str = "default", full_page: bool = False, selector: Optional[str] = None, created_by: Optional[str] = None) -> dict'
    description: Capture screenshot of current browser page or specific element in active session
    implementation_file: 'worktrees/main/mcp-server/src/npl_mcp/browser/interact.py'
    database_tables: [artifacts]
    web_routes: [GET /artifact/{id}]
    user_stories: [US-048]
    test_coverage_percent: null
    example: |
      await browser_navigate(url="https://example.com", session_id="test")
      screenshot = await browser_screenshot(name="after-load", session_id="test")


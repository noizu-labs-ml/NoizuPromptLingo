  - name: create_review
    signature: 'create_review(artifact_id: int, revision_id: int, reviewer_persona: str) -> dict'
    description: Start a new review for an artifact revision
    implementation_file: 'worktrees/main/mcp-server/src/npl_mcp/artifacts/reviews.py'
    implementation_lines: '21-69'
    database_tables:
      - reviews
      - revisions
      - artifacts
    web_routes: []
    user_stories: []
    test_coverage_percent: 25
    example: |
      # Create review for artifact revision
      review = await create_review(
          artifact_id=1,
          revision_id=2,
          reviewer_persona="mike-developer"
      )
      # Returns: {"review_id": 1, "status": "in_progress", ...}

  - name: add_inline_comment
    signature: 'add_inline_comment(review_id: int, location: str, comment: str, persona: str) -> dict'
    description: Add an inline comment to a review at specific location (line:N or @x:X,y:Y)
    implementation_file: 'worktrees/main/mcp-server/src/npl_mcp/artifacts/reviews.py'
    implementation_lines: '71-117'
    database_tables:
      - inline_comments
      - reviews
    web_routes: []
    user_stories: []
    test_coverage_percent: 25
    example: |
      # Add comment at line 58
      comment = await add_inline_comment(
          review_id=1,
          location="line:58",
          comment="This section needs refactoring for better readability",
          persona="mike-developer"
      )
      # Returns: {"comment_id": 1, "location": "line:58", ...}


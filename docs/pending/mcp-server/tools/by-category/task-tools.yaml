    web_routes: [GET /api/tasks/queues/{queue_id}/feed]
    user_stories: []
    test_coverage_percent: 0
    polling_pattern: Pass returned 'next_since' value in subsequent calls to only get new events
    example: |
      # Poll for queue updates
      feed = await get_task_queue_feed(
          queue_id=1,
          since="2025-10-09T14:30:00",
          limit=100
      )
      # Returns: {"events": [...], "next_since": "2025-10-09T15:45:00", "has_more": false}


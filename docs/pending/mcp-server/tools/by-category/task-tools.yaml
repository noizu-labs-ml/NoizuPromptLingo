  - name: get_task_queue_feed
    signature: 'get_task_queue_feed(queue_id: int, since: Optional[str] = None, limit: int = 100) -> dict'
    description: Get activity feed for task queue (for polling updates)
    implementation_file: 'worktrees/main/mcp-server/src/npl_mcp/tasks/manager.py'
